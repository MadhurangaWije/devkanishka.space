<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 1 Quiz — Thinking in Systems</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 1 Quiz: Thinking in Systems</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 1–4</span><span>🎯 8 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0001-what-is-system-design.html" class="btn secondary">← Chapter 1 Lessons</a>
    <a href="0005-dns-the-internets-phone-book.html" class="btn">Chapter 2 →</a>
  </div>
  <script>
const questions=[
{q:"A product manager asks you to design a video-streaming service. Which of these is a non-functional requirement?",
options:["Users can upload videos","Users can search videos by title","The service handles 10,000 concurrent streams without degrading quality","Users can leave comments on videos"],
correct:2,
explanations:["Upload is a feature the system must do — a functional requirement.","Search is a capability/feature — functional.","Concurrent stream capacity is about performance and scalability — a classic non-functional requirement (NFR).","Commenting is a user-facing feature — functional."]},
{q:"You estimate that a social media app has 100 million daily active users, each making ~20 requests/day. What's the approximate requests-per-second?",
options:["~2,000 RPS","~23,000 RPS","~230,000 RPS","~2,300,000 RPS"],
correct:1,
explanations:["100M×20 = 2B requests/day. 2B ÷ 86,400 ≈ 23,000 — this is too low by 10×.","100M × 20 = 2 billion/day. Divide by 86,400 seconds ≈ 23,148 RPS. Correct order of magnitude.","This would require 20 billion requests/day — 10× too high.","This would need 200 billion requests/day — far too high."]},
{q:"When choosing between strong consistency and high availability, which statement best describes the trade-off?",
options:["You can always have both if you use enough servers","Strong consistency means every read returns the latest write, but some requests may fail during network partitions","High availability means data is always correct and up-to-date","Consistency only matters for read operations, not writes"],
correct:1,
explanations:["The CAP theorem shows you cannot guarantee both during network partitions — this is false.","Correct — strong consistency guarantees freshness but may sacrifice availability during partitions (CAP theorem).","High availability means the system always responds, but the response might be stale — not necessarily correct.","Consistency affects both reads AND writes (e.g., which write is considered 'latest')."]},
{q:"A single character in UTF-8 can use up to how many bytes?",
options:["1 byte","2 bytes","4 bytes","8 bytes"],
correct:2,
explanations:["ASCII characters use 1 byte, but many characters (emoji, CJK) need more.","Some characters use 2 bytes, but the max is higher.","Correct — UTF-8 uses 1–4 bytes per character. Emojis and rare scripts use the full 4 bytes.","UTF-8 never exceeds 4 bytes per character. 8 bytes is not part of the encoding scheme."]},
{q:"You're designing a chat application. Which trade-off pair is MOST relevant to the message delivery guarantee?",
options:["Cost vs. features","Latency vs. consistency","Read performance vs. write performance","Horizontal scaling vs. vertical scaling"],
correct:1,
explanations:["Cost and features are business-level concerns, not directly about delivery guarantees.","Correct — delivering messages instantly (low latency) vs. ensuring every recipient sees the exact same order (consistency) is the core tension in chat systems.","Read/write performance matters, but the delivery guarantee is fundamentally about when and whether data is confirmed — a latency/consistency issue.","Scaling approach doesn't directly determine delivery semantics."]},
{q:"In back-of-envelope estimation, why do we typically round to powers of 2 or 10?",
options:["Because computers only work in binary","To make the math simple and focus on order-of-magnitude correctness","Because exact numbers are impossible to calculate","To impress interviewers with mental math"],
correct:1,
explanations:["Computers use binary internally, but that's not why we round in estimations.","Correct — the goal is quick, directional estimates. Being within 2–5× of the real answer is usually sufficient to make architectural decisions.","Exact numbers may be hard but aren't impossible — rounding is a deliberate simplification strategy.","Estimation is a practical engineering skill, not a performance trick."]},
{q:"Which scenario is BEST suited for choosing eventual consistency over strong consistency?",
options:["A banking ledger tracking account balances","A social media 'like' counter","A distributed lock service","An inventory system for limited-stock items"],
correct:1,
explanations:["Banking needs strong consistency — an incorrect balance could mean real money loss.","Correct — a like counter being slightly stale for a moment is acceptable; users won't notice if it shows 4,831 vs 4,832 briefly.","Distributed locks MUST be strongly consistent — otherwise two processes could both believe they hold the lock.","Limited-stock inventory with eventual consistency risks overselling — strong consistency is needed."]},
{q:"System design is BEST described as:",
options:["Writing the most efficient algorithm for a given problem","Choosing which programming language to use for a project","Defining the high-level structure, components, and interactions that let a system meet its requirements at scale","Creating detailed UML diagrams of every class in the system"],
correct:2,
explanations:["Algorithm optimization is important but is a small piece — system design is about the big picture architecture.","Language choice is one small decision within system design, not the discipline itself.","Correct — system design is about architecture: which components exist, how they communicate, and how the system meets functional and non-functional requirements.","UML diagrams can document a design but creating them isn't what system design fundamentally is."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){
  questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});
  renderQuestion(0);
}
function renderQuestion(idx){
  if(idx>=questions.length){showScore();return}
  const q=questions[idx];
  container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;
  container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))});
}
function handleAnswer(qIdx,chosen){
  const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');
  btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});
  container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));
  const dots=progressEl.querySelectorAll('.dot');
  if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}
  dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');
  answered++;
  const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1));
}
function showScore(){
  container.innerHTML='';const pct=Math.round(score/questions.length*100);
  document.getElementById('score-container').style.display='block';
  document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Great job! You have a solid grasp of systems thinking.':'Review the chapter lessons and try again — you\'ll get there!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`;
}
init();
  </script>
</body>
</html>
