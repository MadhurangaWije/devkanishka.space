<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 13 Quiz — Security Architecture</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        .quiz-option { display: block; margin: 0.4rem 0; padding: 0.7rem 1rem; border: 2px solid var(--border, #ccc); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .quiz-option:hover:not(.disabled) { background: #f0f0f0; }
        .quiz-option.correct { border-color: #16a34a; background: #dcfce7; }
        .quiz-option.wrong { border-color: #dc2626; background: #fee2e2; }
        .quiz-option.disabled { cursor: default; opacity: 0.85; }
        .explanation { margin-top: 0.3rem; font-size: 0.88rem; color: #555; }
        .score-box { text-align: center; font-size: 1.3rem; margin: 2rem 0; padding: 1.5rem; }
        .quiz-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        .quiz-nav a { text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 Chapter 13 Quiz: Security Architecture</h1>
    <div class="lesson-meta">
        <span>📘 Chapter 13: Security Architecture</span>
        <span>🧪 10 Questions</span>
    </div>

    <div class="quiz-nav">
        <a href="0054-authentication-authorization.html">Lesson 54</a> •
        <a href="0055-network-security.html">Lesson 55</a> •
        <a href="0056-data-security.html">Lesson 56</a> •
        <a href="0057-common-attack-vectors.html">Lesson 57</a>
    </div>

    <div id="quiz"></div>
    <div id="score" class="card score-box" style="display:none;"></div>

    <script>
    const questions = [
      { q: "Which OAuth2 flow is recommended for single-page applications (SPAs)?",
        opts: ["Client Credentials", "Authorization Code with PKCE", "Implicit Flow", "Resource Owner Password"],
        ans: 1,
        expl: [
          "Client Credentials is for machine-to-machine auth with no user context — not suitable for SPAs.",
          "Correct — Authorization Code with PKCE prevents authorization code interception without requiring a client secret, which SPAs can't securely store.",
          "Implicit Flow was previously used for SPAs but is now discouraged because tokens are exposed in the URL fragment.",
          "Resource Owner Password requires the app to handle user credentials directly, which is a security anti-pattern for SPAs."
        ]},
      { q: "What is a key disadvantage of JWTs compared to opaque session tokens?",
        opts: ["JWTs cannot carry user claims", "JWTs cannot be revoked instantly without extra infrastructure", "JWTs require a database lookup on every request", "JWTs are incompatible with HTTPS"],
        ans: 1,
        expl: [
          "JWTs are specifically designed to carry claims (user ID, roles, expiry) in their payload.",
          "Correct — Once issued, a JWT is valid until expiry. Instant revocation requires a blocklist or short TTLs with refresh tokens, adding complexity.",
          "JWTs are self-contained and validated locally via signature — no database lookup needed (that's their advantage).",
          "JWTs work fine over HTTPS; the transport protocol is independent of the token format."
        ]},
      { q: "What does mTLS (mutual TLS) provide beyond standard TLS?",
        opts: ["Encryption of the payload", "The server also verifies the client's certificate", "Faster handshake times", "Automatic key rotation"],
        ans: 1,
        expl: [
          "Standard TLS already encrypts the payload — mTLS adds authentication, not additional encryption.",
          "Correct — In mTLS both sides present certificates, so the server authenticates the client's identity in addition to the client verifying the server.",
          "mTLS actually adds overhead to the handshake (extra certificate exchange), making it slightly slower.",
          "Key rotation is a separate operational concern managed by PKI infrastructure, not inherent to mTLS."
        ]},
      { q: "Which attack does parameterized queries (prepared statements) prevent?",
        opts: ["Cross-Site Scripting (XSS)", "SQL Injection", "Denial of Service (DoS)", "Man-in-the-Middle (MITM)"],
        ans: 1,
        expl: [
          "XSS is prevented by output encoding/sanitization in HTML context, not parameterized queries.",
          "Correct — Parameterized queries separate SQL logic from data, preventing attackers from injecting malicious SQL through user input.",
          "DoS attacks overwhelm resources; prepared statements address data integrity, not availability.",
          "MITM is prevented by encryption (TLS), not by how queries are constructed."
        ]},
      { q: "In VPC design, what is the purpose of a private subnet?",
        opts: ["To host public-facing web servers", "To isolate resources (databases, app servers) from direct internet access", "To provide a DNS resolution service", "To store SSL certificates"],
        ans: 1,
        expl: [
          "Public-facing servers go in public subnets with internet gateway routes.",
          "Correct — Private subnets have no direct route to the internet, protecting sensitive resources while allowing outbound access via NAT if needed.",
          "DNS is handled by services like Route 53 or VPC DNS resolvers, not by subnet designation.",
          "SSL certificates are stored in certificate managers (ACM, Vault), not in subnets."
        ]},
      { q: "What is the principle of least privilege?",
        opts: ["Users should have admin access by default for convenience", "Grant only the minimum permissions needed to perform a task", "All services share a single set of credentials", "Security reviews happen only at deployment time"],
        ans: 1,
        expl: [
          "Default admin access is the opposite of least privilege and creates massive attack surface.",
          "Correct — Least privilege minimizes damage from compromised credentials by ensuring each entity can only access what it strictly needs.",
          "Shared credentials violate least privilege because one compromise exposes everything.",
          "Security must be continuous; least privilege is about access scope, not review timing."
        ]},
      { q: "Which encryption approach protects data even if the storage system is compromised?",
        opts: ["Encryption in transit only (TLS)", "Encryption at rest with keys stored on the same server", "Encryption at rest with keys in a separate KMS", "No encryption with network firewalls only"],
        ans: 2,
        expl: [
          "TLS protects data moving over the network but doesn't help if an attacker accesses the stored data directly.",
          "If keys are on the same server as the data, a server compromise exposes both — minimal protection.",
          "Correct — Storing encryption keys in a separate Key Management Service means compromising the storage alone doesn't reveal the data.",
          "Firewalls limit access but if breached, unencrypted data is fully exposed."
        ]},
      { q: "What type of attack does CSRF (Cross-Site Request Forgery) exploit?",
        opts: ["Weak password hashing", "The browser automatically sending cookies with requests to a domain", "Unpatched server software", "Buffer overflows in compiled code"],
        ans: 1,
        expl: [
          "Weak password hashing enables credential theft but isn't related to CSRF.",
          "Correct — CSRF exploits the fact that browsers attach cookies automatically, so a malicious site can trigger authenticated requests to another domain.",
          "Unpatched software leads to various exploits but CSRF specifically abuses the cookie/session mechanism.",
          "Buffer overflows are memory-safety issues in native code, unrelated to web request forgery."
        ]},
      { q: "Why is bcrypt preferred over SHA-256 for password hashing?",
        opts: ["Bcrypt is faster to compute", "Bcrypt includes a work factor that makes brute-force attacks computationally expensive", "SHA-256 produces shorter hashes", "Bcrypt doesn't require a salt"],
        ans: 1,
        expl: [
          "Bcrypt is intentionally slow — speed is a disadvantage for password hashing because it helps attackers.",
          "Correct — Bcrypt's configurable work factor (cost) makes each hash attempt expensive, dramatically slowing brute-force and rainbow table attacks.",
          "SHA-256 produces 256-bit (32-byte) hashes; bcrypt outputs 60-character strings. Length isn't the deciding factor.",
          "Bcrypt does include a salt (automatically generated and stored in the hash output)."
        ]},
      { q: "What is defense in depth?",
        opts: ["Using a single very strong firewall", "Layering multiple security controls so a breach of one doesn't compromise the system", "Encrypting data with the longest possible key", "Hiring more security engineers"],
        ans: 1,
        expl: [
          "A single control, no matter how strong, creates a single point of failure — the opposite of defense in depth.",
          "Correct — Defense in depth layers controls (firewalls + auth + encryption + monitoring) so an attacker must defeat multiple barriers.",
          "Key length is one factor in encryption strength, but defense in depth is about multiple complementary layers.",
          "Staffing helps but defense in depth is an architectural strategy, not a hiring practice."
        ]}
    ];

    let score = 0, answered = 0;
    const quiz = document.getElementById('quiz');

    questions.forEach((item, qi) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>Q${qi+1}. ${item.q}</h3><div class="options" id="q${qi}"></div>`;
      quiz.appendChild(div);
      const optBox = div.querySelector('.options');
      item.opts.forEach((opt, oi) => {
        const btn = document.createElement('div');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(qi, oi);
        optBox.appendChild(btn);
      });
    });

    function selectAnswer(qi, oi) {
      const opts = document.querySelectorAll(`#q${qi} .quiz-option`);
      if (opts[0].classList.contains('disabled')) return;
      answered++;
      if (oi === questions[qi].ans) score++;
      opts.forEach((el, i) => {
        el.classList.add('disabled');
        if (i === questions[qi].ans) el.classList.add('correct'); else if (i === oi) el.classList.add('wrong');
        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.textContent = questions[qi].expl[i];
        el.appendChild(exp);
      });
      if (answered === questions.length) showScore();
    }

    function showScore() {
      const el = document.getElementById('score');
      el.style.display = 'block';
      el.innerHTML = `<strong>Score: ${score}/${questions.length}</strong><br><small>${score >= 8 ? '🎉 Excellent!' : score >= 6 ? '👍 Good job!' : '📖 Review the lessons and try again!'}</small>`;
      el.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
