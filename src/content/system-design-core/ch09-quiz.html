<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 9 Quiz — Consistency &amp; Consensus</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 9 Quiz: Consistency &amp; Consensus</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 35–39</span><span>🎯 10 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0035-cap-theorem.html" class="btn secondary">← Chapter 9 Lessons</a>
    <a href="ch10-quiz.html" class="btn">Chapter 10 Quiz →</a>
  </div>
  <script>
const questions=[
{q:"According to the CAP theorem, during a network partition a system must choose between:",
options:["Consistency and Performance","Consistency and Availability","Availability and Durability","Latency and Throughput"],
correct:1,
explanations:["Performance isn't one of CAP's three properties (Consistency, Availability, Partition tolerance).","Correct — when a partition occurs (P is unavoidable), you must sacrifice either C (stale reads) or A (rejecting requests) — you can't have both.","Durability is a separate concern (ACID) — not part of CAP.","Latency/throughput are performance metrics, not CAP properties."]},
{q:"A system using eventual consistency guarantees that:",
options:["All reads always return the latest write","If no new updates are made, all replicas will eventually converge to the same value","Data is never stale under any circumstances","Write conflicts are impossible"],
correct:1,
explanations:["That's strong/linearizable consistency — not eventual.","Correct — eventual consistency guarantees convergence given sufficient time without new writes, but reads may be stale in the interim.","Stale reads are explicitly allowed in eventual consistency.","Conflicts can and do occur — they require resolution strategies (last-write-wins, CRDTs, etc.)."]},
{q:"In the Saga pattern, a compensating transaction is used to:",
options:["Speed up the original transaction","Undo the effects of a previously committed step when a later step fails","Lock all resources until the saga completes","Replicate data across regions"],
correct:1,
explanations:["Compensation is about correctness during failure, not performance.","Correct — since sagas don't use distributed locks, each step must have a compensating action (e.g., refund payment if shipping fails) to maintain consistency.","Sagas explicitly avoid distributed locks — that's why compensations exist.","Data replication is a separate infrastructure concern."]},
{q:"A Raft cluster has 5 nodes. What is the minimum number of nodes that must agree for a write to be committed (quorum)?",
options:["2","3","4","5"],
correct:1,
explanations:["2/5 is not a majority — insufficient for consensus.","Correct — quorum requires a strict majority: ⌊5/2⌋ + 1 = 3 nodes must acknowledge for the write to commit.","4 is more than needed — quorum is the minimum majority (3).","Requiring all 5 would sacrifice availability — Raft tolerates minority failures."]},
{q:"A G-Counter CRDT (grow-only counter) resolves conflicts by:",
options:["Using locks to prevent concurrent updates","Taking the maximum of each node's counter and summing across nodes","Rolling back all increments during a partition","Electing a leader to serialize all increments"],
correct:1,
explanations:["CRDTs are designed to be lock-free and conflict-free by mathematical properties.","Correct — each node maintains its own counter; on merge, take max per node, then sum all. This guarantees convergence without coordination.","CRDTs never roll back — they merge monotonically.","CRDTs work without leaders — that's their key advantage over consensus-based approaches."]},
{q:"Vector clocks help determine:",
options:["The exact wall-clock time an event occurred","Whether two events are causally related or concurrent","The geographic location of a server","How many replicas hold a piece of data"],
correct:1,
explanations:["Vector clocks track logical causality, not physical time.","Correct — by comparing vector timestamps, you can determine if event A happened-before B, B happened-before A, or they're concurrent (potential conflict).","Vector clocks have nothing to do with geography.","Replica count is a configuration concern — vector clocks track event ordering."]},
{q:"Which consistency model is STRONGEST?",
options:["Eventual consistency","Causal consistency","Linearizability (strong consistency)","Read-your-writes consistency"],
correct:2,
explanations:["Eventual is the weakest — only guarantees convergence over time.","Causal preserves cause-effect ordering but allows concurrent operations to be seen in different orders.","Correct — linearizability guarantees every operation appears to execute atomically at some point between invocation and response; equivalent to a single-copy system.","Read-your-writes is a session guarantee — weaker than linearizability since other clients may see stale data."]},
{q:"In a Raft cluster with 5 nodes, what is the maximum number of node failures the cluster can tolerate while remaining available?",
options:["1","2","3","4"],
correct:1,
explanations:["With 5 nodes, losing 1 still leaves 4 — more than needed. The tolerance is higher.","Correct — a 5-node cluster needs 3 for quorum, so it tolerates up to 2 failures (5 - 3 = 2).","Losing 3 leaves only 2 nodes — below the quorum of 3, so the cluster cannot commit writes.","Losing 4 leaves 1 node — far below quorum."]},
{q:"A saga using choreography (events) differs from orchestration in that:",
options:["Each service listens for events and decides locally what to do next — no central coordinator","A single orchestrator service directs each step in sequence","It requires two-phase commit for atomicity","It cannot handle compensation logic"],
correct:0,
explanations:["Correct — in choreography, services react to domain events autonomously. This is decentralized but can be harder to trace and debug.","That describes orchestration — a central coordinator drives the flow.","Sagas explicitly avoid 2PC; both choreography and orchestration use compensations instead.","Choreography absolutely supports compensation — services emit compensating events on failure."]},
{q:"You're designing a collaborative document editor. Which consistency approach fits BEST?",
options:["Strict serializability with global locks","CRDTs or Operational Transformation for conflict-free concurrent edits","Single-leader replication with read-your-writes","Eventual consistency with last-write-wins"],
correct:1,
explanations:["Global locks would make real-time collaboration impossible — every keystroke would block.","Correct — CRDTs/OT allow multiple users to edit simultaneously and merge changes automatically without conflicts, enabling real-time collaboration.","Single-leader can't handle concurrent edits from multiple users without conflicts.","Last-write-wins would silently discard one user's edits — unacceptable for collaboration."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});renderQuestion(0)}
function renderQuestion(idx){if(idx>=questions.length){showScore();return}const q=questions[idx];container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))})}
function handleAnswer(qIdx,chosen){const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));const dots=progressEl.querySelectorAll('.dot');if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');answered++;const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1))}
function showScore(){container.innerHTML='';const pct=Math.round(score/questions.length*100);document.getElementById('score-container').style.display='block';document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You have a solid grasp of distributed consistency.':'Review CAP, sagas, and consensus — these are tricky but essential!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`}
init();
  </script>
</body>
</html>
