<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 12 Quiz — Observability & Reliability</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        .quiz-option { display: block; margin: 0.4rem 0; padding: 0.7rem 1rem; border: 2px solid var(--border, #ccc); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .quiz-option:hover:not(.disabled) { background: #f0f0f0; }
        .quiz-option.correct { border-color: #16a34a; background: #dcfce7; }
        .quiz-option.wrong { border-color: #dc2626; background: #fee2e2; }
        .quiz-option.disabled { cursor: default; opacity: 0.85; }
        .explanation { margin-top: 0.3rem; font-size: 0.88rem; color: #555; }
        .score-box { text-align: center; font-size: 1.3rem; margin: 2rem 0; padding: 1.5rem; }
        .quiz-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        .quiz-nav a { text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 Chapter 12 Quiz: Observability & Reliability</h1>
    <div class="lesson-meta">
        <span>📘 Chapter 12: Observability & Reliability</span>
        <span>🧪 10 Questions</span>
    </div>

    <div class="quiz-nav">
        <a href="0049-monitoring-metrics-logs-traces.html">Lesson 49</a> •
        <a href="0050-slos-slis-error-budgets.html">Lesson 50</a> •
        <a href="0051-distributed-tracing.html">Lesson 51</a> •
        <a href="0052-circuit-breakers-graceful-degradation.html">Lesson 52</a> •
        <a href="0053-chaos-engineering.html">Lesson 53</a>
    </div>

    <div id="quiz"></div>
    <div id="score" class="card score-box" style="display:none;"></div>

    <script>
    const questions = [
      { q: "Which observability signal is best for understanding the overall health of a service at a glance?",
        opts: ["Logs", "Metrics", "Traces", "Alerts"],
        ans: 1,
        expl: [
          "Logs provide detailed event records but require aggregation to see overall health — they're better for debugging specific issues.",
          "Correct — Metrics are numeric time-series data (e.g., request rate, error rate, latency percentiles) ideal for dashboards and at-a-glance health.",
          "Traces show the path of individual requests across services — great for debugging latency but too granular for overall health.",
          "Alerts are triggered by metrics/logs but are notifications, not an observability signal themselves."
        ]},
      { q: "What does 99.9% availability ('three nines') translate to in monthly downtime?",
        opts: ["~5 minutes", "~44 minutes", "~8.7 hours", "~4.3 minutes"],
        ans: 1,
        expl: [
          "5 minutes would be roughly 99.99% (four nines) monthly allowance.",
          "Correct — 30 days × 24h × 60m = 43,200 min; 0.1% of that ≈ 43.2 minutes per month.",
          "8.7 hours corresponds to about 99% availability (two nines).",
          "4.3 minutes would be even tighter than four nines — that's about 99.99%."
        ]},
      { q: "What is an error budget?",
        opts: ["The maximum number of bugs allowed per sprint", "The amount of unreliability your SLO permits before you must act", "A financial budget for incident response tooling", "The time allocated for post-mortem meetings"],
        ans: 1,
        expl: [
          "Error budgets relate to service reliability, not bug counts in development sprints.",
          "Correct — If your SLO is 99.9%, your error budget is the 0.1% of requests/time that can fail before you must slow feature releases to restore reliability.",
          "Error budgets are about reliability tolerance, not financial spending on tools.",
          "Post-mortem time is an organizational practice, not what 'error budget' means in SRE."
        ]},
      { q: "In a circuit breaker, what happens in the 'half-open' state?",
        opts: ["All requests are blocked", "A limited number of test requests are allowed through", "The circuit permanently closes", "Requests are queued indefinitely"],
        ans: 1,
        expl: [
          "All requests blocked is the 'open' state — the circuit breaker stops calling the failing service entirely.",
          "Correct — In half-open, the breaker lets a few probe requests through to test if the downstream service has recovered.",
          "The circuit only closes (resumes normal traffic) if the test requests in half-open succeed.",
          "Queuing indefinitely would exhaust memory; circuit breakers fail fast rather than queue."
        ]},
      { q: "What is the primary goal of distributed tracing?",
        opts: ["Replacing all log statements", "Tracking a single request's path across multiple services", "Monitoring CPU usage on each server", "Encrypting inter-service communication"],
        ans: 1,
        expl: [
          "Tracing complements logs; it doesn't replace them — logs still provide detailed event context.",
          "Correct — Distributed tracing follows a request end-to-end across service boundaries, showing latency at each hop.",
          "CPU monitoring is the domain of infrastructure metrics, not tracing.",
          "Encryption (mTLS) is a security concern, unrelated to observability tracing."
        ]},
      { q: "Which chaos engineering principle states you should start with a hypothesis?",
        opts: ["Minimize blast radius", "Run experiments in production", "Start with a steady-state hypothesis", "Automate experiments"],
        ans: 2,
        expl: [
          "Minimizing blast radius is a safety principle — important but not about hypotheses.",
          "Running in production is a chaos engineering principle, but it's about environment fidelity, not hypothesis formation.",
          "Correct — You define what 'normal' looks like (steady state) then hypothesize that it continues under failure, and test that.",
          "Automation helps scale chaos experiments but isn't about the hypothesis-first approach."
        ]},
      { q: "What does a span represent in a distributed trace?",
        opts: ["A complete end-to-end request", "A single unit of work within a trace (one service call or operation)", "A log line with a timestamp", "A metric data point"],
        ans: 1,
        expl: [
          "A complete end-to-end request is represented by the entire trace (collection of spans), not a single span.",
          "Correct — A span represents one operation (e.g., an HTTP call, a DB query) with start time, duration, and metadata.",
          "Log lines can be attached to spans but a span itself is a timed operation, not just a log entry.",
          "Metric data points are numeric measurements; spans are structural elements of traces."
        ]},
      { q: "Which SLI (Service Level Indicator) is most relevant for a payment processing service?",
        opts: ["Page load time", "Successful transaction rate (correctness)", "Image compression ratio", "Email delivery speed"],
        ans: 1,
        expl: [
          "Page load time matters for frontend UX but isn't the critical indicator for payment processing correctness.",
          "Correct — For payments, correctness (did the charge succeed/fail accurately?) is the most critical indicator.",
          "Image compression is irrelevant to payment processing.",
          "Email delivery is a separate service concern, not a payment processing SLI."
        ]},
      { q: "What triggers a circuit breaker to move from 'closed' to 'open'?",
        opts: ["A single failed request", "Failure rate exceeding a configured threshold", "A manual operator command only", "Time-based rotation schedule"],
        ans: 1,
        expl: [
          "A single failure rarely justifies opening the circuit — transient errors are normal.",
          "Correct — The breaker opens when failures exceed a threshold (e.g., 50% of requests in a 10-second window), indicating a systemic problem.",
          "Manual intervention is possible but circuit breakers are designed to trip automatically based on failure patterns.",
          "Circuit breakers are event-driven by failure rates, not on a time schedule."
        ]},
      { q: "Which is the correct relationship between SLO, SLI, and SLA?",
        opts: ["SLA → SLI → SLO (SLA is most specific)", "SLI measures, SLO sets target, SLA is the contractual agreement with consequences", "They are three names for the same concept", "SLO is only used internally and never relates to SLAs"],
        ans: 1,
        expl: [
          "SLAs are the broadest (contractual); SLOs are targets; SLIs are the specific measurements — SLA is least specific technically.",
          "Correct — SLI is what you measure (e.g., latency), SLO is the target you set (e.g., p99 < 200ms), SLA is the contract with customers including penalties.",
          "They are distinct concepts at different levels: measurement, target, and contract.",
          "SLOs often inform SLAs — internal SLOs are typically stricter than external SLAs to provide a safety margin."
        ]}
    ];

    let score = 0, answered = 0;
    const quiz = document.getElementById('quiz');

    questions.forEach((item, qi) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>Q${qi+1}. ${item.q}</h3><div class="options" id="q${qi}"></div>`;
      quiz.appendChild(div);
      const optBox = div.querySelector('.options');
      item.opts.forEach((opt, oi) => {
        const btn = document.createElement('div');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(qi, oi);
        optBox.appendChild(btn);
      });
    });

    function selectAnswer(qi, oi) {
      const opts = document.querySelectorAll(`#q${qi} .quiz-option`);
      if (opts[0].classList.contains('disabled')) return;
      answered++;
      if (oi === questions[qi].ans) score++;
      opts.forEach((el, i) => {
        el.classList.add('disabled');
        if (i === questions[qi].ans) el.classList.add('correct'); else if (i === oi) el.classList.add('wrong');
        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.textContent = questions[qi].expl[i];
        el.appendChild(exp);
      });
      if (answered === questions.length) showScore();
    }

    function showScore() {
      const el = document.getElementById('score');
      el.style.display = 'block';
      el.innerHTML = `<strong>Score: ${score}/${questions.length}</strong><br><small>${score >= 8 ? '🎉 Excellent!' : score >= 6 ? '👍 Good job!' : '📖 Review the lessons and try again!'}</small>`;
      el.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
