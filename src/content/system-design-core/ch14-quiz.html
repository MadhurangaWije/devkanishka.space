<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 14 Quiz — Data Pipelines & Stream Processing</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        .quiz-option { display: block; margin: 0.4rem 0; padding: 0.7rem 1rem; border: 2px solid var(--border, #ccc); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .quiz-option:hover:not(.disabled) { background: #f0f0f0; }
        .quiz-option.correct { border-color: #16a34a; background: #dcfce7; }
        .quiz-option.wrong { border-color: #dc2626; background: #fee2e2; }
        .quiz-option.disabled { cursor: default; opacity: 0.85; }
        .explanation { margin-top: 0.3rem; font-size: 0.88rem; color: #555; }
        .score-box { text-align: center; font-size: 1.3rem; margin: 2rem 0; padding: 1.5rem; }
        .quiz-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        .quiz-nav a { text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 Chapter 14 Quiz: Data Pipelines & Stream Processing</h1>
    <div class="lesson-meta">
        <span>📘 Chapter 14: Data Pipelines & Stream Processing</span>
        <span>🧪 10 Questions</span>
    </div>

    <div class="quiz-nav">
        <a href="0058-batch-vs-stream-processing.html">Lesson 58</a> •
        <a href="0059-event-sourcing-cqrs.html">Lesson 59</a> •
        <a href="0060-data-lakes-warehouses.html">Lesson 60</a> •
        <a href="0061-real-time-analytics-architecture.html">Lesson 61</a>
    </div>

    <div id="quiz"></div>
    <div id="score" class="card score-box" style="display:none;"></div>

    <script>
    const questions = [
      { q: "When is batch processing preferred over stream processing?",
        opts: ["Real-time fraud detection", "Nightly report generation from the full day's data", "Live dashboard updates", "Instant notification delivery"],
        ans: 1,
        expl: [
          "Fraud detection needs sub-second decisions — batch processing would be far too slow.",
          "Correct — Nightly reports process a bounded dataset at once; latency isn't critical and batch gives simpler exactly-once semantics.",
          "Live dashboards require continuous data flow — stream processing with windowing is the right fit.",
          "Instant notifications need event-driven or stream processing for low-latency delivery."
        ]},
      { q: "What is a key trade-off of event sourcing?",
        opts: ["Events are mutable, making debugging harder", "Storage grows indefinitely since all events are retained", "It prevents building read-optimized views", "It only works with SQL databases"],
        ans: 1,
        expl: [
          "Events are immutable by design — that's a benefit for audit trails and debugging, not a drawback.",
          "Correct — Storing every event forever increases storage costs and requires strategies like snapshotting to keep replay performance manageable.",
          "Event sourcing pairs naturally with CQRS to build multiple read-optimized projections from the event log.",
          "Event sourcing works with any storage (Kafka, EventStoreDB, DynamoDB) — it's not limited to SQL."
        ]},
      { q: "What does CQRS separate?",
        opts: ["Frontend and backend code", "Read models from write models", "Database tables from indexes", "Authentication from authorization"],
        ans: 1,
        expl: [
          "CQRS is a data architecture pattern, not a frontend/backend separation concern.",
          "Correct — CQRS (Command Query Responsibility Segregation) uses different models for reads (queries) and writes (commands), allowing each to be optimized independently.",
          "Tables and indexes are database internals; CQRS operates at the application/model layer.",
          "Auth separation is an access control concern unrelated to CQRS's read/write model split."
        ]},
      { q: "How does a data lake differ from a data warehouse?",
        opts: ["A data lake only stores structured data", "A data lake stores raw data in any format; a warehouse stores structured, processed data", "A data warehouse is always cheaper", "A data lake requires data to be cleaned before ingestion"],
        ans: 1,
        expl: [
          "Data lakes store all formats: structured, semi-structured (JSON), and unstructured (images, logs).",
          "Correct — Lakes use schema-on-read (store raw, interpret later); warehouses use schema-on-write (clean and structure before loading).",
          "Warehouses often cost more per TB due to compute-coupled storage, though lakes can have hidden costs in processing.",
          "Lakes follow 'store first, process later' — data is ingested raw without upfront cleaning (ELT vs ETL)."
        ]},
      { q: "Which system is designed for OLAP (Online Analytical Processing) workloads?",
        opts: ["PostgreSQL with row-based storage", "Redis in-memory cache", "ClickHouse columnar database", "MongoDB document store"],
        ans: 2,
        expl: [
          "PostgreSQL's row-based storage is optimized for OLTP (transactional reads/writes of individual rows), not analytical aggregations.",
          "Redis is an in-memory key-value store for caching and real-time data, not analytical queries over large datasets.",
          "Correct — ClickHouse uses columnar storage optimized for scanning large volumes of data and computing aggregations quickly.",
          "MongoDB excels at flexible document storage for applications but isn't optimized for analytical column-scan workloads."
        ]},
      { q: "What windowing strategy groups events by when they actually occurred (event time)?",
        opts: ["Processing-time windows", "Event-time windows with watermarks", "Session windows based on server clock", "Fixed-size batch windows"],
        ans: 1,
        expl: [
          "Processing-time windows group by when the system processes events, which can differ significantly from when events occurred due to delays.",
          "Correct — Event-time windows use timestamps from the event itself, with watermarks to handle late-arriving data.",
          "Session windows can use event time, but the key distinction here is event-time vs processing-time, and watermarks handle lateness.",
          "Fixed-size batch windows typically use processing time and don't account for out-of-order events."
        ]},
      { q: "In event sourcing, what is a snapshot used for?",
        opts: ["Deleting old events to save storage", "Caching the current state to avoid replaying all events from the beginning", "Taking database backups", "Recording failed events for retry"],
        ans: 1,
        expl: [
          "Events are never deleted in event sourcing (immutable log); snapshots don't replace them.",
          "Correct — A snapshot captures aggregate state at a point in time so recovery only replays events after the snapshot, not the entire history.",
          "Database backups are an infrastructure concern; snapshots in event sourcing are application-level state checkpoints.",
          "Failed events go to dead-letter queues; snapshots are about performance optimization for replay."
        ]},
      { q: "Which is a benefit of the ELT (Extract, Load, Transform) pattern over ETL?",
        opts: ["Data is always cleaned before storage", "Raw data is preserved in the lake, allowing new transformations without re-extraction", "It requires less storage", "It only works with batch processing"],
        ans: 1,
        expl: [
          "ELT loads raw data first and transforms later — data is NOT cleaned before storage.",
          "Correct — Loading raw data means you can apply new transformations as needs evolve without going back to the source systems.",
          "ELT typically uses more storage (raw + transformed copies) but storage is cheap compared to re-extraction costs.",
          "ELT works with both batch and stream — you can continuously load raw events and transform them on demand."
        ]},
      { q: "What problem does exactly-once semantics solve in stream processing?",
        opts: ["Network latency between services", "Duplicate processing of the same event causing incorrect results", "Schema evolution in event formats", "Horizontal scaling of consumers"],
        ans: 1,
        expl: [
          "Network latency is a performance issue; exactly-once is about correctness of processing.",
          "Correct — Without exactly-once guarantees, failures and retries can process events multiple times, leading to double-counting or duplicate side effects.",
          "Schema evolution is handled by schema registries and versioning, not delivery semantics.",
          "Scaling consumers is a partitioning concern; exactly-once ensures each event's effect occurs precisely once regardless of failures."
        ]},
      { q: "When is CQRS most beneficial?",
        opts: ["Simple CRUD applications with equal read/write loads", "Systems where read and write patterns differ dramatically in shape and scale", "Single-user desktop applications", "Static websites with no database"],
        ans: 1,
        expl: [
          "Simple CRUD apps don't benefit from CQRS's complexity — a single model works fine when reads and writes are symmetric.",
          "Correct — CQRS shines when reads need denormalized views at high scale while writes need strong consistency, or when read/write ratios are very asymmetric.",
          "Single-user apps rarely have the scale or complexity that justifies separating read/write models.",
          "Static websites have no write model at all — CQRS is irrelevant without dynamic data."
        ]}
    ];

    let score = 0, answered = 0;
    const quiz = document.getElementById('quiz');

    questions.forEach((item, qi) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>Q${qi+1}. ${item.q}</h3><div class="options" id="q${qi}"></div>`;
      quiz.appendChild(div);
      const optBox = div.querySelector('.options');
      item.opts.forEach((opt, oi) => {
        const btn = document.createElement('div');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(qi, oi);
        optBox.appendChild(btn);
      });
    });

    function selectAnswer(qi, oi) {
      const opts = document.querySelectorAll(`#q${qi} .quiz-option`);
      if (opts[0].classList.contains('disabled')) return;
      answered++;
      if (oi === questions[qi].ans) score++;
      opts.forEach((el, i) => {
        el.classList.add('disabled');
        if (i === questions[qi].ans) el.classList.add('correct'); else if (i === oi) el.classList.add('wrong');
        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.textContent = questions[qi].expl[i];
        el.appendChild(exp);
      });
      if (answered === questions.length) showScore();
    }

    function showScore() {
      const el = document.getElementById('score');
      el.style.display = 'block';
      el.innerHTML = `<strong>Score: ${score}/${questions.length}</strong><br><small>${score >= 8 ? '🎉 Excellent!' : score >= 6 ? '👍 Good job!' : '📖 Review the lessons and try again!'}</small>`;
      el.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
