<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 5 Quiz — Caching</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 5 Quiz: Caching</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 19–22</span><span>🎯 9 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0019-why-cache-the-memory-hierarchy.html" class="btn secondary">← Chapter 5 Lessons</a>
    <a href="0023-what-is-a-load-balancer.html" class="btn">Chapter 6 →</a>
  </div>
  <script>
const questions=[
{q:"In the cache-aside (lazy loading) pattern, when does data get written to the cache?",
options:["On every database write","When the application starts up","Only after a cache miss — the app reads from DB then populates the cache","At scheduled intervals via a background job"],
correct:2,
explanations:["Cache-aside doesn't automatically update the cache on writes — that's write-through.","Pre-loading on startup is cache warming, a separate optimization. Cache-aside is demand-driven.","Correct — cache-aside is reactive: on a miss, the app queries the DB, stores the result in cache, then returns it. The cache only contains data that has been requested.","Scheduled refresh is a TTL-based or polling strategy, not cache-aside. Cache-aside is triggered by individual requests."]},
{q:"What is the 'thundering herd' problem in caching?",
options:["Too many items in the cache causing memory overflow","A popular cache entry expires, causing hundreds of simultaneous requests to hit the database","The cache server running out of network bandwidth","Users requesting data that will never be cached"],
correct:1,
explanations:["Memory overflow is a capacity planning issue (solved by eviction policies), not the thundering herd.","Correct — when a hot key expires, all concurrent requests find a cache miss simultaneously and slam the database. Solutions include locking (only one request rebuilds) or staggered TTLs.","Network bandwidth is a general infrastructure concern, not specific to the thundering herd pattern.","Requesting uncacheable data is the 'cache penetration' problem, not thundering herd."]},
{q:"Write-behind (write-back) caching writes data to the database:",
options:["Before writing to the cache","Synchronously, at the same time as the cache write","Asynchronously, after the cache has been updated","Never — data only lives in the cache"],
correct:2,
explanations:["Writing to DB first is the write-through pattern, not write-behind.","Synchronous DB+cache writes together is also write-through behavior.","Correct — write-behind updates the cache immediately and asynchronously flushes to the database later (batched). This gives fast writes but risks data loss if the cache crashes before flushing.","Caches are volatile — never persisting to a database would mean data loss on any cache failure. Write-behind does eventually persist."]},
{q:"A CDN (Content Delivery Network) primarily improves performance by:",
options:["Compressing all data to 10% of its original size","Serving content from edge servers geographically close to the user","Running faster databases than the origin server","Eliminating the need for DNS resolution"],
correct:1,
explanations:["CDNs may use compression, but that's not their primary mechanism — geographic proximity is the key benefit.","Correct — CDNs cache content at edge locations worldwide. A user in Tokyo gets served from a nearby edge server instead of the origin in Virginia, dramatically reducing latency.","CDNs don't run databases — they cache static and semi-static content closer to users.","CDNs still require DNS resolution (often using it for geographic routing). They don't eliminate DNS."]},
{q:"When does caching HURT rather than help?",
options:["When the same data is read millions of times","When data changes on nearly every request and staleness is unacceptable","When the database is under heavy read load","When response latency requirements are strict"],
correct:1,
explanations:["Highly repeated reads are the IDEAL use case for caching — massive benefit from serving from memory.","Correct — if data changes constantly and you need fresh reads every time, the cache is always stale or constantly invalidated. You pay cache overhead (memory, invalidation logic) with no benefit.","Heavy read load is exactly when caching helps most — offloading reads from the database to a fast cache.","Strict latency requirements make caching MORE valuable — cache hits are orders of magnitude faster than DB queries."]},
{q:"What is the approximate speed difference between reading from L1 CPU cache vs. reading from an SSD?",
options:["About 2× faster","About 100× faster","About 10,000× faster","About 1,000,000× faster"],
correct:2,
explanations:["2× would mean cache barely matters. The real difference is much larger.","100× understates the gap significantly. RAM vs SSD alone is ~100×, and L1 cache is faster than RAM.","Correct — L1 cache access is ~1 nanosecond, SSD random read is ~100 microseconds. That's roughly 100,000× (order of magnitude ~10,000×). This is why the memory hierarchy matters so much.","1,000,000× overstates it. That's more like L1 cache vs. network round-trip to another continent."]},
{q:"You're using TTL-based cache invalidation. A TTL of 60 seconds means:",
options:["The cache is refreshed exactly every 60 seconds via polling","After 60 seconds, the cached entry is considered stale and will be re-fetched on the next request","The database is queried every 60 seconds regardless of traffic","Users must wait 60 seconds before they can read cached data"],
correct:1,
explanations:["TTL doesn't poll — it's passive. The entry simply expires and is re-fetched on demand.","Correct — TTL sets a maximum age. After 60 seconds, the next request triggers a cache miss, fetches fresh data from the DB, and repopulates the cache. Between expiry and the next request, nothing happens.","TTL is lazy, not proactive. No query happens unless someone requests that key after expiry.","TTL controls how long data stays cached, not a delay before reading. Reads from cache are instant while the entry is valid."]},
{q:"Which cache eviction policy removes the item that hasn't been accessed for the longest time?",
options:["FIFO (First In, First Out)","LRU (Least Recently Used)","LFU (Least Frequently Used)","Random eviction"],
correct:1,
explanations:["FIFO evicts the oldest item by insertion time, regardless of whether it was recently accessed. A frequently-accessed old item would still be evicted.","Correct — LRU tracks the last access time and evicts the item that hasn't been touched for the longest. It assumes recently-accessed items are likely to be accessed again.","LFU evicts the item with the fewest total accesses. An item accessed many times long ago would be kept over a recently-accessed item with fewer total hits.","Random eviction doesn't consider access patterns at all — it's simple but less effective than LRU for most workloads."]},
{q:"A CDN has a cache HIT ratio of 95%. This means:",
options:["95% of content is stored at origin, 5% at the edge","5% of requests go to the origin server, 95% are served from CDN edge","The CDN is 95% full on disk space","95% of users are close to a CDN node"],
correct:1,
explanations:["Hit ratio is about requests served, not where content is stored.","Correct — a 95% hit ratio means 95 out of 100 requests are served directly from the edge cache without touching the origin. Only 5% cause a cache miss and fetch from origin.","Hit ratio measures request efficiency, not storage utilization.","Hit ratio is about cache effectiveness per request, not user geography."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){
  questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});
  renderQuestion(0);
}
function renderQuestion(idx){
  if(idx>=questions.length){showScore();return}
  const q=questions[idx];
  container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;
  container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))});
}
function handleAnswer(qIdx,chosen){
  const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');
  btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});
  container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));
  const dots=progressEl.querySelectorAll('.dot');
  if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}
  dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');
  answered++;
  const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1));
}
function showScore(){
  container.innerHTML='';const pct=Math.round(score/questions.length*100);
  document.getElementById('score-container').style.display='block';
  document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You understand caching strategies and trade-offs.':'Review the chapter lessons and try again!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`;
}
init();
  </script>
</body>
</html>
