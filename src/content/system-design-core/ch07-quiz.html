<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 7 Quiz — Scalability</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 7 Quiz: Scalability</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 27–30</span><span>🎯 10 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0027-the-scalability-cube.html" class="btn secondary">← Chapter 7 Lessons</a>
    <a href="ch08-quiz.html" class="btn">Chapter 8 Quiz →</a>
  </div>
  <script>
const questions=[
{q:"The Scale Cube's X-axis represents scaling by:",
options:["Splitting by data/function (e.g., microservices)","Cloning — running multiple identical copies behind a load balancer","Partitioning data across shards","Increasing the size of a single server"],
correct:1,
explanations:["Splitting by function is Y-axis decomposition.","Correct — X-axis is horizontal duplication: run N identical copies and distribute load among them.","Data partitioning is Z-axis scaling (sharding by a key).","Bigger hardware is vertical scaling — not part of the Scale Cube axes."]},
{q:"What is the typical order of database scaling strategies as load increases?",
options:["Shard → Replicate → Add indexes → Vertical scale","Vertical scale → Add indexes/caching → Read replicas → Sharding","Sharding → Read replicas → Vertical scale → Caching","Read replicas → Sharding → Vertical scale → Indexing"],
correct:1,
explanations:["Sharding is complex and usually a last resort, not a first step.","Correct — start simple (bigger box), optimize queries/cache, add read replicas for read-heavy loads, then shard when vertical limits are hit.","This reverses the typical progression — sharding first is premature.","Read replicas before vertical scaling skips simpler optimizations."]},
{q:"A token bucket rate limiter has capacity 100 tokens, refill rate 10 tokens/second. After being empty for 5 seconds with no requests, how many tokens are available?",
options:["50 tokens","100 tokens","150 tokens","Unlimited"],
correct:0,
explanations:["Correct — 10 tokens/s × 5 seconds = 50 tokens. Starting from empty and capacity is 100, so no overflow: exactly 50 tokens available.","10/s × 5s = 50, not 100. The bucket needs 10 full seconds from empty to reach capacity.","150 exceeds the bucket capacity of 100 — impossible regardless of time.","Token buckets have a hard cap at their capacity — never unlimited."]},
{q:"Connection pooling improves performance primarily by:",
options:["Encrypting database connections automatically","Eliminating the overhead of repeatedly creating and tearing down TCP connections","Guaranteeing zero-latency database queries","Replacing the need for database indexes"],
correct:1,
explanations:["Pooling is about reuse, not encryption — those are orthogonal.","Correct — TCP handshakes and auth per request are expensive; pools maintain warm connections ready for immediate reuse.","Pooling reduces connection overhead, but query latency still depends on the query itself.","Pools manage connections; indexes optimize data retrieval — completely different concerns."]},
{q:"A stateless service design means:",
options:["The service never reads or writes any data","No server holds session-specific data between requests — state lives in external stores","The service cannot scale horizontally","Users must re-authenticate on every single request"],
correct:1,
explanations:["Stateless services still read/write data — just not in-process session state.","Correct — any instance can handle any request because shared state is externalized (DB, cache, token), enabling easy horizontal scaling.","The opposite — statelessness is what ENABLES horizontal scaling.","Tokens (JWTs) can carry auth state without server-side sessions; re-authentication isn't required."]},
{q:"The Z-axis of the Scale Cube partitions data by:",
options:["Randomly distributing requests","Splitting based on a key (e.g., user ID, geography)","Running identical copies of the full dataset","Decomposing by business function"],
correct:1,
explanations:["Random distribution is X-axis behavior (load balancing across clones).","Correct — Z-axis shards data by a partition key so each node owns a subset of the data.","Identical full copies is X-axis horizontal duplication.","Function-based decomposition is Y-axis (microservices)."]},
{q:"Which rate limiting algorithm allows short bursts above the average rate while enforcing a long-term average?",
options:["Fixed Window Counter","Token Bucket","Sliding Window Log","Leaky Bucket"],
correct:1,
explanations:["Fixed Window allows bursts at window boundaries but doesn't explicitly control burst size.","Correct — Token Bucket accumulates tokens up to a burst capacity, allowing short bursts while the refill rate enforces the average.","Sliding Window Log tracks exact timestamps — it's precise but doesn't inherently allow controlled bursts.","Leaky Bucket smooths traffic to a constant rate — it specifically prevents bursts."]},
{q:"A service stores user sessions in a Redis cluster rather than in-process memory. This is an example of:",
options:["Vertical scaling","Externalizing state for stateless design","Sharding the application","Synchronous replication"],
correct:1,
explanations:["Moving session to Redis isn't about making the server bigger.","Correct — by storing sessions externally, the app servers become stateless and interchangeable, enabling horizontal scaling.","Sharding splits data by key — this is about where state lives, not how it's partitioned.","Redis may replicate internally, but the design pattern here is state externalization."]},
{q:"If a token bucket has capacity 200 and refill rate 50/s, what is the maximum number of requests that can pass in a 1-second burst?",
options:["50","100","200","250"],
correct:2,
explanations:["50/s is the sustained rate, but a full bucket allows a larger burst.","100 is not related to either capacity or refill rate.","Correct — if the bucket is full (200 tokens), all 200 can be consumed instantly in one burst. After that, only 50/s can pass.","You cannot exceed the bucket capacity — max burst equals the capacity (200)."]},
{q:"Why is database connection pooling especially critical in serverless/auto-scaling environments?",
options:["Serverless functions never access databases","Each new instance creates new connections, risking database connection exhaustion","Connection pools are not supported in serverless","Serverless functions have unlimited memory"],
correct:1,
explanations:["Serverless functions absolutely access databases — that's why pooling matters.","Correct — rapid scale-out spawns many instances simultaneously; without pooling (or a proxy like PgBouncer/RDS Proxy), the DB's max_connections is quickly exhausted.","Pooling works in serverless — services like RDS Proxy exist specifically for this.","Serverless has strict memory limits — this is false."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});renderQuestion(0)}
function renderQuestion(idx){if(idx>=questions.length){showScore();return}const q=questions[idx];container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))})}
function handleAnswer(qIdx,chosen){const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));const dots=progressEl.querySelectorAll('.dot');if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');answered++;const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1))}
function showScore(){container.innerHTML='';const pct=Math.round(score/questions.length*100);document.getElementById('score-container').style.display='block';document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Great work! You have a strong grasp of scalability patterns.':'Review the chapter and try again — scalability takes practice!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`}
init();
  </script>
</body>
</html>
