<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 6 Quiz — Load Balancing</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 6 Quiz: Load Balancing</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 23–26</span><span>🎯 10 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0023-what-is-a-load-balancer.html" class="btn secondary">← Chapter 6 Lessons</a>
    <a href="ch07-quiz.html" class="btn">Chapter 7 Quiz →</a>
  </div>
  <script>
const questions=[
{q:"A Layer 4 load balancer makes routing decisions based on which information?",
options:["HTTP headers and URL paths","IP address and TCP/UDP port","Cookie values and session IDs","Request body content"],
correct:1,
explanations:["HTTP headers are Layer 7 data — not visible to a L4 balancer.","Correct — L4 operates at the transport layer, routing based on IP and port without inspecting application payloads.","Cookies are HTTP-level (L7) constructs; L4 cannot inspect them.","Request body inspection requires L7 deep packet inspection."]},
{q:"Which load balancing algorithm is BEST when backend servers have different CPU/memory capacities?",
options:["Round Robin","Weighted Round Robin","Random","Source IP Hash"],
correct:1,
explanations:["Round Robin treats all servers equally — it ignores capacity differences.","Correct — Weighted Round Robin assigns more traffic to powerful servers proportionally to their weight.","Random doesn't account for server capacity — it distributes evenly on average.","Source IP Hash provides session affinity but doesn't consider server capacity."]},
{q:"A Layer 7 load balancer can do all of the following EXCEPT:",
options:["Route /api/* to one pool and /static/* to another","Terminate TLS and inspect HTTP headers","Modify TCP sequence numbers to reduce network latency","Inject or strip HTTP headers before forwarding"],
correct:2,
explanations:["L7 balancers excel at path-based routing — this is a core feature.","TLS termination is a standard L7 reverse proxy capability.","Correct — modifying TCP sequence numbers is a transport-layer operation unrelated to L7 load balancing.","Header manipulation (adding X-Forwarded-For, etc.) is a common L7 feature."]},
{q:"What is the PRIMARY purpose of a reverse proxy in front of application servers?",
options:["To cache DNS responses","To hide backend server topology from clients and centralize cross-cutting concerns","To replace a CDN entirely","To encrypt data at rest on backend servers"],
correct:1,
explanations:["DNS caching is handled by DNS resolvers, not reverse proxies.","Correct — reverse proxies shield backends, provide a single entry point, and handle TLS, compression, rate limiting, etc.","A reverse proxy can cache, but CDNs serve content globally from edge locations — different scope.","Data-at-rest encryption is a storage concern, not a proxy function."]},
{q:"An active health check differs from a passive health check in that it:",
options:["Only detects failures after clients report errors","Periodically sends probe requests to backends regardless of traffic","Requires no additional network traffic","Relies solely on TCP connection reuse metrics"],
correct:1,
explanations:["Detecting from client errors is passive (reactive) health checking.","Correct — active checks proactively send synthetic requests (e.g., GET /health) on a schedule to detect issues before real traffic is affected.","Active checks specifically generate extra traffic (the probes).","TCP reuse metrics may inform passive checks, but active checks send explicit probes."]},
{q:"In an active-passive failover configuration, what happens when the active node fails?",
options:["Both nodes start serving traffic simultaneously","The passive node is promoted to active and begins handling requests","All traffic is dropped until manual intervention","The load balancer creates a new server instance automatically"],
correct:1,
explanations:["That would be active-active — not active-passive failover.","Correct — the standby (passive) node takes over the active role, often via a floating IP or DNS update.","Active-passive is designed for automatic failover without manual intervention.","Auto-scaling and failover are separate mechanisms — failover promotes an existing standby."]},
{q:"Which algorithm provides session affinity (sticky sessions) without storing state in the load balancer?",
options:["Least Connections","Source IP Hash","Random with Two Choices","Weighted Least Connections"],
correct:1,
explanations:["Least Connections picks the server with fewest connections — no affinity guarantee.","Correct — hashing the client's source IP deterministically maps the same client to the same server without any session table.","Random with Two Choices optimizes load distribution but provides no affinity.","Weighted Least Connections optimizes load but doesn't pin clients to servers."]},
{q:"A Least Connections algorithm is MOST beneficial when:",
options:["All requests take exactly the same time to process","Requests have highly variable processing times","Servers have identical specs and traffic is uniform","You need to ensure each server gets exactly the same number of requests"],
correct:1,
explanations:["If all requests take equal time, Round Robin works just as well.","Correct — when some requests are slow (e.g., file uploads vs. health checks), Least Connections avoids overloading a server stuck on long requests.","With identical servers and uniform traffic, simpler algorithms suffice.","That describes Round Robin — Least Connections may give uneven request counts deliberately."]},
{q:"What is the key benefit of a load balancer performing TLS termination?",
options:["Eliminates the need for encryption entirely","Offloads CPU-intensive cryptographic work from backend servers","Prevents DDoS attacks completely","Makes the system strongly consistent"],
correct:1,
explanations:["TLS termination decrypts at the LB; traffic can still be re-encrypted to backends if needed — it doesn't eliminate encryption.","Correct — TLS handshakes and symmetric encryption are CPU-intensive; offloading them to the LB frees backend resources for application logic.","TLS termination doesn't prevent DDoS — that requires rate limiting and scrubbing.","TLS termination is a security/performance concern, unrelated to consistency."]},
{q:"In active-active failover, how is 'split-brain' typically prevented?",
options:["By turning off one node permanently","Using a consensus mechanism or shared quorum to agree on ownership","By disabling all health checks","Using only Layer 4 load balancing"],
correct:1,
explanations:["Turning off a node converts it to active-passive — it doesn't solve split-brain.","Correct — quorum-based consensus (or a fencing mechanism) ensures only one partition considers itself authoritative, preventing conflicting writes.","Disabling health checks would make split-brain worse — you'd never detect the partition.","L4 vs L7 is a routing concern; split-brain is a distributed systems coordination problem."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});renderQuestion(0)}
function renderQuestion(idx){if(idx>=questions.length){showScore();return}const q=questions[idx];container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))})}
function handleAnswer(qIdx,chosen){const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));const dots=progressEl.querySelectorAll('.dot');if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');answered++;const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1))}
function showScore(){container.innerHTML='';const pct=Math.round(score/questions.length*100);document.getElementById('score-container').style.display='block';document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You understand load balancing well.':'Review the chapter lessons and try again!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`}
init();
  </script>
</body>
</html>
