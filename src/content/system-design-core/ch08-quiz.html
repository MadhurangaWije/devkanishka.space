<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 8 Quiz — Async Processing</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 8 Quiz: Asynchronous Processing</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 31–34</span><span>🎯 10 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0031-synchronous-vs-asynchronous.html" class="btn secondary">← Chapter 8 Lessons</a>
    <a href="ch09-quiz.html" class="btn">Chapter 9 Quiz →</a>
  </div>
  <script>
const questions=[
{q:"Which scenario is BEST handled synchronously rather than asynchronously?",
options:["Sending a welcome email after user registration","Resizing uploaded images into multiple thumbnails","Validating a credit card number format before form submission","Generating a monthly analytics report"],
correct:2,
explanations:["Emails can be sent async — the user doesn't need to wait for SMTP delivery.","Image resizing is slow and non-blocking — ideal for async workers.","Correct — format validation is fast, the user needs immediate feedback, and the next step depends on the result. Sync is appropriate.","Reports take minutes; queueing them async keeps the request responsive."]},
{q:"'At-least-once' delivery guarantee means:",
options:["Messages may be lost but are never duplicated","Messages are delivered exactly one time, no more","Messages are guaranteed delivered but may arrive more than once","Messages are delivered in strict order with no gaps"],
correct:2,
explanations:["That describes 'at-most-once' — fire and forget.","That's 'exactly-once' semantics, which is extremely hard to achieve in distributed systems.","Correct — the system retries until acknowledged, so duplicates are possible. Consumers must handle idempotency.","Ordering is a separate guarantee from delivery count."]},
{q:"An idempotent operation ensures that:",
options:["It always executes faster the second time","Performing it multiple times produces the same result as performing it once","It can only be called by one consumer at a time","It automatically retries on failure"],
correct:1,
explanations:["Idempotency is about correctness of repeated execution, not speed.","Correct — e.g., 'SET balance = 500' is idempotent; 'ADD 100 to balance' is not. Safe to retry without side effects.","That's mutual exclusion/locking — different concept.","Retry logic is separate from idempotency — though idempotency makes retries safe."]},
{q:"Kafka is preferred over RabbitMQ when you need:",
options:["Complex routing patterns with topic exchanges and bindings","High-throughput ordered event streaming with replay capability","Automatic message acknowledgment and simple task queues","Low-latency priority queues with message TTL"],
correct:1,
explanations:["Complex routing (fanout, topic, headers) is RabbitMQ's strength with its exchange model.","Correct — Kafka's append-only log provides ordered, replayable streams at massive throughput; consumers can re-read history.","RabbitMQ excels at traditional task queues with ack/nack semantics.","Priority queues and TTL are RabbitMQ features; Kafka retains all messages by time/size policy."]},
{q:"A Dead Letter Queue (DLQ) serves what primary purpose?",
options:["Storing messages that have been successfully processed","Capturing messages that repeatedly fail processing so they don't block the main queue","Encrypting sensitive messages at rest","Load balancing messages across consumers"],
correct:1,
explanations:["Successfully processed messages are acknowledged and removed — no need to store them separately.","Correct — after N failed attempts, poison messages move to the DLQ for investigation without blocking healthy messages behind them.","Encryption is a transport/storage concern, not a queue routing pattern.","Load balancing is the broker's job; DLQs handle failures specifically."]},
{q:"An 'event' differs from a 'command' in messaging because:",
options:["Events are always synchronous; commands are asynchronous","An event states something happened (past tense); a command requests an action (imperative)","Commands can have multiple handlers; events cannot","Events require acknowledgment; commands do not"],
correct:1,
explanations:["Both events and commands can be delivered asynchronously via queues.","Correct — 'OrderPlaced' (event, notification) vs 'PlaceOrder' (command, directive). Events are broadcast facts; commands target a specific handler.","The reverse is true — events can have many subscribers; commands typically have one handler.","Acknowledgment depends on delivery guarantees, not message type."]},
{q:"Which delivery guarantee requires the MOST overhead to implement correctly?",
options:["At-most-once","At-least-once","Exactly-once","Best-effort"],
correct:2,
explanations:["At-most-once is simplest — send and forget, no retries needed.","At-least-once adds retries and acks but allows duplicates — moderate overhead.","Correct — exactly-once requires idempotent consumers AND transactional coordination between producers, brokers, and consumers. Extremely complex in distributed systems.","Best-effort and at-most-once are essentially the same — minimal overhead."]},
{q:"In a task queue pattern, what happens if a worker crashes mid-processing without acknowledging?",
options:["The message is permanently lost","The broker redelivers the message to another available worker","The broker deletes the queue entirely","All pending messages are duplicated"],
correct:1,
explanations:["With at-least-once semantics, unacknowledged messages are redelivered — not lost.","Correct — the broker's visibility timeout expires, and the message becomes available again for another consumer to process.","Brokers don't delete queues on worker failures — they're designed for fault tolerance.","Only the unacknowledged message is redelivered, not all messages."]},
{q:"You're building an e-commerce checkout. The payment service is slow (2-3s). What's the best async pattern?",
options:["Make the user wait synchronously for the full 3 seconds","Accept the order immediately, process payment async, notify user of result via webhook/email","Skip payment processing entirely to reduce latency","Run payment on a cron job every hour"],
correct:1,
explanations:["3s synchronous waits degrade UX and tie up server threads — not scalable.","Correct — accept the order, enqueue payment processing, and notify on completion. The user gets immediate feedback while heavy work happens in the background.","Skipping payment isn't a real option for an e-commerce system.","Hourly batches are too slow for real-time purchases — users expect timely confirmation."]},
{q:"Why should consumers of an at-least-once queue use idempotency keys?",
options:["To encrypt messages in transit","To ensure processing a duplicate message doesn't cause incorrect side effects","To guarantee message ordering","To reduce network bandwidth"],
correct:1,
explanations:["Idempotency keys are about correctness of repeated processing, not encryption.","Correct — if a message is delivered twice, the idempotency key (e.g., unique request ID) lets the consumer detect the duplicate and skip re-processing.","Ordering requires partition keys or sequence numbers — different mechanism.","Idempotency keys don't affect message size or bandwidth."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});renderQuestion(0)}
function renderQuestion(idx){if(idx>=questions.length){showScore();return}const q=questions[idx];container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))})}
function handleAnswer(qIdx,chosen){const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));const dots=progressEl.querySelectorAll('.dot');if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');answered++;const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1))}
function showScore(){container.innerHTML='';const pct=Math.round(score/questions.length*100);document.getElementById('score-container').style.display='block';document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You understand async processing patterns well.':'Review the lessons on messaging and async patterns!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`}
init();
  </script>
</body>
</html>
