<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 3 Quiz — Web Architecture Patterns</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 3 Quiz: Web Architecture Patterns</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 9–12</span><span>🎯 9 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0009-single-server-architecture.html" class="btn secondary">← Chapter 3 Lessons</a>
    <a href="0013-sql-databases.html" class="btn">Chapter 4 →</a>
  </div>
  <script>
const questions=[
{q:"When is a single-server architecture an appropriate choice?",
options:["For a system expecting millions of users from day one","For an internal tool used by a 10-person team","For a globally distributed e-commerce platform","For a service with strict 99.99% uptime SLA"],
correct:1,
explanations:["Millions of users would overwhelm a single server — you'd need horizontal scaling from the start.","Correct — a small internal tool with limited users doesn't justify the complexity of distributed architecture. A single server is simple, cheap, and sufficient.","Global distribution requires multiple servers in different regions — the opposite of single-server.","A single server is a single point of failure, making 99.99% uptime (< 53 min downtime/year) nearly impossible."]},
{q:"What is the PRIMARY benefit of separating the application server from the database server?",
options:["It eliminates the need for a network connection","Each tier can be scaled, tuned, and maintained independently","It makes the application stateless automatically","It removes the need for database backups"],
correct:1,
explanations:["Separation actually introduces a network hop between app and DB — it doesn't eliminate networking.","Correct — with separate tiers, you can scale app servers independently of the database, apply OS/hardware tuning specific to each role, and update one without touching the other.","Separating tiers doesn't make the app stateless — that's a separate design decision about where state lives.","You still need backups regardless of architecture. Separation just isolates concerns."]},
{q:"A web application stores user session data in a local variable on the server. What problem arises when you add a second server behind a load balancer?",
options:["The database runs out of storage","Users may lose their session if routed to a different server","The servers will have conflicting IP addresses","HTTP requests will fail entirely"],
correct:1,
explanations:["Local session storage doesn't affect database storage at all.","Correct — if sessions live in Server A's memory, a user routed to Server B on the next request won't have their session. This is the classic 'sticky session' problem of stateful designs.","Servers behind a load balancer have their own IPs — the load balancer handles routing. No conflict.","HTTP requests will work fine — they just won't find the session data on the wrong server."]},
{q:"Which of these is a STATELESS design?",
options:["A server that stores a shopping cart in its local memory","A server that reads all needed data from a shared database or token on each request","A WebSocket server maintaining open connections per user","A game server tracking each player's position in RAM"],
correct:1,
explanations:["Local memory shopping cart = server-specific state. If that server dies, the cart is lost.","Correct — when the server derives everything it needs from the request itself (e.g., JWT token) or an external store, any server can handle any request. That's stateless.","WebSocket connections are inherently stateful — each connection maintains per-client state in memory.","Tracking positions in RAM is the definition of in-memory state tied to a specific server."]},
{q:"You have a single database server at its CPU limit. Users are mostly reading data (95% reads). What scaling approach gives the best immediate relief?",
options:["Vertical scaling — add more CPU cores to the one server","Add read replicas (horizontal scaling of reads)","Shard the database across multiple write nodes","Replace the database with a NoSQL store"],
correct:1,
explanations:["Vertical scaling works but hits a ceiling quickly and requires downtime. It's not the best for a read-heavy workload.","Correct — with 95% reads, adding read replicas offloads the vast majority of queries from the primary. This is simple, well-understood, and highly effective for read-heavy workloads.","Sharding adds significant complexity (shard keys, cross-shard queries). Overkill when the issue is read load — replicas are simpler.","Switching databases is a massive migration effort. The problem is capacity, not data model — replicas solve it without changing technology."]},
{q:"Horizontal scaling means:",
options:["Upgrading to a more powerful machine (bigger CPU, more RAM)","Adding more machines of similar size to share the workload","Moving from HDD to SSD storage","Using a faster programming language"],
correct:1,
explanations:["Upgrading a single machine is vertical scaling (scaling UP), not horizontal.","Correct — horizontal scaling (scaling OUT) means adding more machines. Traffic is distributed across them, providing both more capacity and redundancy.","Storage upgrades improve I/O speed but don't change the scaling dimension — that's still vertical improvement.","Language choice affects per-machine efficiency but isn't a scaling strategy in the architectural sense."]},
{q:"What is 'sticky sessions' and what problem does it solve?",
options:["A CDN caching technique that stores sessions at edge nodes","A load balancer configuration that routes a user to the same server every time, solving stateful session loss","A database replication strategy for session tables","An encryption method for session cookies"],
correct:1,
explanations:["CDNs cache static content, not user sessions. Sticky sessions are a load-balancer feature.","Correct — sticky sessions (session affinity) ensure the same user always hits the same server, so their in-memory session is found. It works but limits true horizontal scaling.","Session replication is a different approach — copying sessions across all nodes rather than routing to a specific one.","Session cookies may be encrypted, but 'sticky sessions' refers to routing behavior, not encryption."]},
{q:"What is the MAIN disadvantage of vertical scaling?",
options:["It's always more expensive than horizontal scaling","There's a hard ceiling — machines only get so big","It requires rewriting the application code","It introduces network latency between components"],
correct:1,
explanations:["Vertical scaling can actually be cheaper initially — one big machine vs. managing a distributed fleet. Cost isn't the main issue.","Correct — you can't buy a server with 10,000 CPU cores. Physical hardware has limits. Once you hit the biggest available machine, you MUST scale horizontally.","Vertical scaling usually requires zero code changes — that's actually its advantage over horizontal scaling.","A single big machine has no inter-machine network latency — that's a horizontal scaling concern."]},
{q:"In a three-tier architecture (presentation, application, data), which tier is typically easiest to scale horizontally?",
options:["The data tier — just add more databases","The presentation tier — static assets are easily replicated","The application tier — stateless servers can be freely duplicated","All three tiers are equally easy to scale"],
correct:2,
explanations:["The data tier is hardest — databases have state, consistency requirements, and replication complexity.","The presentation tier (CDNs/static files) is easy too, but the question is about the 'application' tier's unique advantage.","Correct — stateless application servers are the easiest to scale horizontally. Since they hold no state, you can add/remove instances freely behind a load balancer.","The data tier is significantly harder due to consistency, replication, and sharding concerns. They're not equal."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){
  questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});
  renderQuestion(0);
}
function renderQuestion(idx){
  if(idx>=questions.length){showScore();return}
  const q=questions[idx];
  container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;
  container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))});
}
function handleAnswer(qIdx,chosen){
  const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');
  btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});
  container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));
  const dots=progressEl.querySelectorAll('.dot');
  if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}
  dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');
  answered++;
  const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1));
}
function showScore(){
  container.innerHTML='';const pct=Math.round(score/questions.length*100);
  document.getElementById('score-container').style.display='block';
  document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You understand web architecture patterns.':'Review the chapter lessons and try again!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`;
}
init();
  </script>
</body>
</html>
