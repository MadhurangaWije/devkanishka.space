<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 4 Quiz — Databases &amp; Storage</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 4 Quiz: Databases &amp; Storage</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 13–18</span><span>🎯 10 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0013-sql-databases.html" class="btn secondary">← Chapter 4 Lessons</a>
    <a href="0019-why-cache-the-memory-hierarchy.html" class="btn">Chapter 5 →</a>
  </div>
  <script>
const questions=[
{q:"In ACID properties, what does 'Isolation' guarantee?",
options:["The database survives power failures","Transactions don't interfere with each other — concurrent transactions produce the same result as sequential execution","All constraints (foreign keys, unique) are enforced","Either all operations in a transaction complete, or none do"],
correct:1,
explanations:["Surviving power failures is Durability — data persists after commit even if the system crashes.","Correct — Isolation ensures concurrent transactions don't see each other's intermediate states. The result is as if they ran one after another.","Constraint enforcement is part of Consistency — the database moves from one valid state to another.","All-or-nothing is Atomicity — partial transactions are rolled back completely."]},
{q:"You're building an e-commerce platform with complex relationships (users, orders, products, inventory). Which database type fits best?",
options:["A document store like MongoDB","A key-value store like Redis","A relational database like PostgreSQL","A graph database like Neo4j"],
correct:2,
explanations:["Document stores struggle with complex cross-document joins. Orders referencing products and users would require denormalization or application-level joins.","Key-value stores are great for simple lookups but lack query capability for complex relationships and transactions.","Correct — relational databases excel at structured data with relationships. JOIN operations, foreign keys, and ACID transactions make e-commerce operations (inventory deduction + order creation) safe and queryable.","Graph databases excel at relationship traversal (social networks, recommendations) but are overkill for standard e-commerce CRUD with well-defined schemas."]},
{q:"What is the PRIMARY trade-off of adding a database index?",
options:["Indexes make reads faster but writes slower and use additional storage","Indexes speed up writes but slow down reads","Indexes eliminate the need for a primary key","Indexes make the database use less disk space"],
correct:0,
explanations:["Correct — an index is a separate data structure that must be updated on every INSERT/UPDATE/DELETE. You gain fast reads but pay with slower writes and extra storage.","Indexes speed up reads (lookups/queries), not writes. Writes actually become slower because the index must be maintained.","Indexes are separate from primary keys. A table still needs a primary key regardless of additional indexes.","Indexes use MORE disk space — they're an additional data structure (B-tree, hash table) stored alongside the data."]},
{q:"In leader-follower (master-slave) replication, what happens if the leader fails?",
options:["All followers automatically become leaders simultaneously","A follower must be promoted to leader (failover), during which writes may be briefly unavailable","The system continues writing to followers with no interruption","All data is lost permanently"],
correct:1,
explanations:["Multiple leaders simultaneously would cause write conflicts. Only one follower is promoted.","Correct — failover requires detecting the failure, electing a new leader, and redirecting writes. During this window, writes are unavailable (typically seconds to minutes).","Followers are read-only replicas. They cannot accept writes without being promoted to leader first.","Data persists on followers — it's not lost. The challenge is restoring write capability, not recovering data."]},
{q:"You need to shard a users table. Which shard key is BEST for even distribution?",
options:["Country code (US, UK, IN, etc.)","User registration date","User ID (UUID or auto-increment with hash)","User's first name"],
correct:2,
explanations:["Country causes hot spots — most users may be in 2-3 countries, making those shards overwhelmed while others are nearly empty.","Registration date creates temporal hot spots — all new writes hit the 'current' shard, and old shards become cold.","Correct — hashing a UUID or auto-increment ID distributes users uniformly across shards with no hot spots. Each shard gets roughly equal load.","Names follow language distributions (many Johns, few Xaviers). This creates severely uneven shards."]},
{q:"What does 'eventual consistency' mean in a replicated database?",
options:["The database will never be consistent","All replicas will converge to the same state given enough time without new writes","Data is consistent only at midnight during maintenance windows","Reads always return the most recent write"],
correct:1,
explanations:["Eventual consistency DOES reach consistency — just not instantly. The 'eventual' means it will get there.","Correct — if writes stop, all replicas will eventually propagate updates and converge to identical state. During propagation, different replicas may return different (stale) values.","There's no scheduled consistency window — propagation happens continuously, typically within milliseconds to seconds.","Always returning the most recent write is STRONG consistency. Eventual consistency allows temporarily stale reads."]},
{q:"A B-tree index on a column with 1 million rows allows finding a specific row in approximately how many disk reads?",
options:["1 million (must scan all)","About 500,000 (half the table)","About 20 (log₂ of 1 million)","Exactly 1 (direct lookup)"],
correct:2,
explanations:["A full scan means you have NO index. The whole point of an index is to avoid scanning all rows.","A half-scan suggests linear search stopping at the midpoint — but B-trees are tree structures, not linear.","Correct — B-trees have O(log n) lookup. log₂(1,000,000) ≈ 20. In practice, B-trees have high branching factors so it's often 3-4 disk reads, but ~20 comparisons.","A single direct lookup would require knowing the exact physical location. Even hash indexes may need a few reads."]},
{q:"When would you choose a document database (like MongoDB) over a relational database?",
options:["When you need complex multi-table JOINs with ACID transactions","When your data has a flexible, nested schema that varies between records","When referential integrity between entities is critical","When you need to run complex analytical SQL queries"],
correct:1,
explanations:["Complex JOINs and multi-table ACID are relational databases' strengths — document stores struggle here.","Correct — document databases shine when each record has a different structure (e.g., product catalogs where a shirt has 'size' but a laptop has 'RAM'). No schema migration needed.","Referential integrity (foreign keys) is enforced by relational databases. Document stores typically don't enforce cross-document references.","Analytical SQL with GROUP BY, window functions, and complex aggregations is the domain of relational/analytical databases."]},
{q:"In multi-leader replication, what is the biggest challenge?",
options:["It's impossible to have more than two leaders","Write conflicts — two leaders may accept conflicting updates to the same data","Read performance degrades significantly","It uses less storage than single-leader"],
correct:1,
explanations:["You can have many leaders — the challenge is managing conflicts between them, not a count limit.","Correct — if two leaders both update the same row differently, you need a conflict resolution strategy (last-write-wins, merge, manual). This is the fundamental difficulty of multi-leader setups.","Read performance is usually fine or improved — more nodes to read from. The challenge is write conflict resolution.","Multi-leader replication uses MORE storage (data replicated to all leaders), not less."]},
{q:"You have a time-series dataset (IoT sensor readings, millions per day). Which is the best sharding strategy?",
options:["Shard by sensor_id to keep each sensor's data together","Shard by random hash to distribute evenly","Shard by the exact timestamp","Shard by the reading value (temperature, humidity)"],
correct:0,
explanations:["Correct — sharding by sensor_id groups a sensor's readings together for efficient time-range queries on that sensor, while distributing load across many sensors. Combined with time-based partitioning within each shard, this is optimal.","Random hashing destroys time-range query efficiency — scanning a sensor's history would hit every shard.","Exact timestamp sharding creates hot spots on the 'now' shard where all current writes land.","Reading values change constantly and have no query locality — this makes no logical sense as a shard key."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){
  questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});
  renderQuestion(0);
}
function renderQuestion(idx){
  if(idx>=questions.length){showScore();return}
  const q=questions[idx];
  container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;
  container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))});
}
function handleAnswer(qIdx,chosen){
  const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');
  btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});
  container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));
  const dots=progressEl.querySelectorAll('.dot');
  if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}
  dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');
  answered++;
  const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1));
}
function showScore(){
  container.innerHTML='';const pct=Math.round(score/questions.length*100);
  document.getElementById('score-container').style.display='block';
  document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You have a strong grasp of database concepts.':'Review the chapter lessons and try again!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`;
}
init();
  </script>
</body>
</html>
