<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 10 Quiz — Microservices</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 10 Quiz: Microservices</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 40–44</span><span>🎯 10 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0040-monolith-vs-microservices.html" class="btn secondary">← Chapter 10 Lessons</a>
    <a href="ch11-quiz.html" class="btn">Chapter 11 Quiz →</a>
  </div>
  <script>
const questions=[
{q:"When is splitting a monolith into microservices MOST justified?",
options:["The codebase is less than 6 months old with 3 developers","Different modules need independent scaling and have separate deployment cadences","The team wants to use a trendy technology stack","A single developer maintains the entire application"],
correct:1,
explanations:["A young, small-team codebase benefits from monolith simplicity — splitting adds premature complexity.","Correct — independent scaling, separate release cycles, and team autonomy are the primary drivers for microservice extraction.","Technology preference alone doesn't justify the operational overhead of microservices.","A single developer gains nothing from microservices — the coordination overhead would slow them down."]},
{q:"A 'bounded context' in Domain-Driven Design helps determine service boundaries by:",
options:["Counting lines of code per module","Identifying areas where a domain model has a specific, well-defined meaning and minimal coupling to other contexts","Randomly splitting the database into equal-sized tables","Grouping services by programming language"],
correct:1,
explanations:["Lines of code is an arbitrary metric unrelated to domain modeling.","Correct — bounded contexts define where a ubiquitous language applies. Service boundaries should align with these natural seams to minimize cross-service coupling.","Database splitting should follow domain boundaries, not arbitrary size.","Language choice is a technical concern, not a domain boundary."]},
{q:"The 'sync death spiral' in microservices occurs when:",
options:["All services use asynchronous messaging exclusively","Service A synchronously calls B, which calls C, which calls D — creating deep chain dependencies where one slow service cascades failures","Services communicate via event streams","Each service has its own database"],
correct:1,
explanations:["Async messaging actually prevents sync death spirals.","Correct — synchronous call chains create tight temporal coupling. If D is slow, C blocks, then B blocks, then A blocks — cascading latency and failures upward.","Event streams decouple services temporally — the opposite of the death spiral.","Database-per-service is a best practice that reduces coupling."]},
{q:"A service mesh sidecar proxy handles which concerns WITHOUT changing application code?",
options:["Business logic and domain validation","mTLS, retries, circuit breaking, and observability","Database schema migrations","Frontend rendering and CSS"],
correct:1,
explanations:["Business logic must remain in the application — sidecars handle infrastructure concerns.","Correct — the sidecar (e.g., Envoy in Istio) transparently intercepts network traffic to add security, resilience, and observability as infrastructure.","Schema migrations are application-level data concerns, not network infrastructure.","Frontend concerns are irrelevant to service-to-service communication."]},
{q:"The Strangler Fig pattern migrates a monolith by:",
options:["Rewriting the entire system from scratch in one big release","Incrementally routing specific functionality to new services while the old system continues running","Shutting down the monolith immediately and hoping the new services work","Forking the monolith repository into multiple copies"],
correct:1,
explanations:["Big-bang rewrites are risky — the strangler fig is explicitly the alternative to this.","Correct — like the strangler fig vine, new services gradually take over routes/features. The monolith shrinks over time until it can be decommissioned.","Immediate cutover defeats the purpose — strangler fig is about gradual, low-risk migration.","Forking creates multiple monoliths — not a decomposition strategy."]},
{q:"A modular monolith provides which advantage over both a tangled monolith and microservices?",
options:["It requires Kubernetes and service mesh from day one","Clear module boundaries and encapsulation with simple in-process communication — no network overhead","It eliminates the need for any testing","Modules cannot share a database"],
correct:1,
explanations:["A modular monolith deploys as one unit — no need for orchestration infrastructure.","Correct — you get the organizational benefits of clear boundaries without the operational complexity of distributed systems. Modules communicate via in-process calls, not networks.","All architectures need testing — modularity actually makes testing easier.","Modules in a modular monolith CAN share a database; they just access their own schema/tables through defined interfaces."]},
{q:"Which heuristic suggests two modules should NOT be in the same microservice?",
options:["They share the same programming language","They are maintained by the same team and always deploy together","They have very different scaling requirements and change at different rates","They both read from the same cache"],
correct:2,
explanations:["Language alone doesn't determine service boundaries — polyglot is an option, not a requirement.","Same team + same deploy cadence suggests they SHOULD stay together — splitting adds overhead.","Correct — different scaling needs and change frequencies are strong signals for separation. One module needing 100 instances while another needs 2 creates waste if coupled.","Sharing a cache is a coupling concern but not a primary splitting heuristic — you'd need to address the shared dependency."]},
{q:"In microservices, the 'database per service' pattern exists primarily to:",
options:["Increase storage costs","Ensure each service can evolve its schema independently without breaking others","Make joins across services easier","Reduce the total number of databases in the system"],
correct:1,
explanations:["Cost isn't the driver — independence and autonomy are.","Correct — schema independence means teams can change their data model without coordinating with every other team, enabling autonomous deployment.","It makes cross-service joins harder (intentionally) — you use APIs or events instead.","It increases the number of databases — each service owns its own."]},
{q:"What is the PRIMARY risk of extracting a service too early (before understanding the domain)?",
options:["The code becomes too clean and well-organized","You draw boundaries in the wrong place, creating expensive cross-service communication for tightly-coupled concepts","Deployment becomes too simple","The team has too much autonomy"],
correct:1,
explanations:["Clean code is never a risk — but premature extraction often creates the opposite.","Correct — wrong boundaries mean chatty inter-service calls, distributed transactions, and shared data problems. It's cheaper to refactor within a monolith than across network boundaries.","Microservices make deployment more complex, not simpler.","Team autonomy is a benefit, but wrong boundaries create cross-team dependencies instead."]},
{q:"Circuit breakers in microservice communication prevent cascade failures by:",
options:["Permanently shutting down the failing service","Opening the circuit (fast-failing) when a downstream service error rate exceeds a threshold, giving it time to recover","Encrypting all inter-service traffic","Adding more replicas of the calling service"],
correct:1,
explanations:["Circuit breakers don't kill services — they temporarily stop calling them.","Correct — when errors exceed a threshold, the circuit opens: calls fail immediately without waiting. After a timeout, it half-opens to test recovery. This prevents thread exhaustion and cascade failures.","Encryption is a security concern, not a resilience pattern.","More replicas of the caller doesn't help if the downstream is failing — it amplifies the problem."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});renderQuestion(0)}
function renderQuestion(idx){if(idx>=questions.length){showScore();return}const q=questions[idx];container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))})}
function handleAnswer(qIdx,chosen){const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));const dots=progressEl.querySelectorAll('.dot');if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');answered++;const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1))}
function showScore(){container.innerHTML='';const pct=Math.round(score/questions.length*100);document.getElementById('score-container').style.display='block';document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Great job! You understand microservice architecture well.':'Review the lessons on service boundaries and communication patterns!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`}
init();
  </script>
</body>
</html>
