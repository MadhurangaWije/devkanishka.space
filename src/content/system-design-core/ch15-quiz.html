<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 15 Quiz — Putting It All Together</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        .quiz-option { display: block; margin: 0.4rem 0; padding: 0.7rem 1rem; border: 2px solid var(--border, #ccc); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .quiz-option:hover:not(.disabled) { background: #f0f0f0; }
        .quiz-option.correct { border-color: #16a34a; background: #dcfce7; }
        .quiz-option.wrong { border-color: #dc2626; background: #fee2e2; }
        .quiz-option.disabled { cursor: default; opacity: 0.85; }
        .explanation { margin-top: 0.3rem; font-size: 0.88rem; color: #555; }
        .score-box { text-align: center; font-size: 1.3rem; margin: 2rem 0; padding: 1.5rem; }
        .quiz-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        .quiz-nav a { text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 Chapter 15 Quiz: Putting It All Together</h1>
    <div class="lesson-meta">
        <span>📘 Chapter 15: Putting It All Together</span>
        <span>🧪 10 Questions</span>
    </div>

    <div class="quiz-nav">
        <a href="0062-design-url-shortener.html">Lesson 62</a> •
        <a href="0063-design-chat-system.html">Lesson 63</a> •
        <a href="0064-design-news-feed.html">Lesson 64</a> •
        <a href="0065-presenting-system-design.html">Lesson 65</a>
    </div>

    <div id="quiz"></div>
    <div id="score" class="card score-box" style="display:none;"></div>

    <script>
    const questions = [
      { q: "For a URL shortener, which ID generation strategy provides the best combination of uniqueness and short URLs?",
        opts: ["Auto-incrementing database IDs", "Base62-encoded unique IDs (counter or hash-based)", "Full UUIDs as the short code", "Random 3-character strings"],
        ans: 1,
        expl: [
          "Auto-increment IDs are predictable (users can enumerate URLs) and expose internal state.",
          "Correct — Base62 encoding (a-z, A-Z, 0-9) of a unique numeric ID creates short, URL-safe codes. A 7-char Base62 string gives 3.5 trillion combinations.",
          "UUIDs are 36 characters — far too long for a 'short' URL and defeat the purpose.",
          "3 characters give only ~238K combinations — collisions become frequent very quickly at scale."
        ]},
      { q: "Why are WebSockets preferred over HTTP polling for a chat system?",
        opts: ["WebSockets use less memory on the server", "WebSockets provide full-duplex, persistent connections with lower latency for real-time messages", "WebSockets are simpler to implement than REST", "WebSockets automatically handle offline message queuing"],
        ans: 1,
        expl: [
          "WebSocket connections actually consume more server memory (persistent connections) than stateless HTTP.",
          "Correct — WebSockets maintain an open connection for bidirectional communication, delivering messages instantly without repeated HTTP overhead.",
          "WebSockets require connection management, heartbeats, and reconnection logic — they're more complex than REST.",
          "Offline message queuing requires server-side storage regardless; WebSockets only deliver when connected."
        ]},
      { q: "In a news feed system, what is 'fan-out on write'?",
        opts: ["Computing each user's feed when they open the app", "Pre-computing and pushing new posts to all followers' feed caches at write time", "Writing posts to a single global timeline", "Sending push notifications to all followers"],
        ans: 1,
        expl: [
          "Computing feeds on open is 'fan-out on read' — it avoids pre-computation but adds read latency.",
          "Correct — Fan-out on write pushes each new post to every follower's pre-computed feed immediately, making reads fast (just fetch the cache).",
          "A global timeline doesn't personalize feeds per user and doesn't scale for relevance/ranking.",
          "Push notifications are a delivery mechanism; fan-out on write is about data distribution to feed caches."
        ]},
      { q: "What is the hybrid fan-out approach for users with millions of followers (celebrities)?",
        opts: ["Fan-out on write for all users equally", "Fan-out on write for normal users; fan-out on read (merge at read time) for celebrity posts", "Never show celebrity posts in feeds", "Store celebrity posts only in a CDN"],
        ans: 1,
        expl: [
          "Fan-out on write for celebrities would mean writing to millions of feed caches per post — extremely expensive and slow.",
          "Correct — Normal users' posts are pushed to follower feeds (fast writes, fast reads). Celebrity posts are merged into feeds at read time to avoid millions of write operations.",
          "Not showing celebrity posts defeats the purpose of following them.",
          "CDNs cache static content; feed assembly is a dynamic, personalized operation."
        ]},
      { q: "Which framework helps structure a system design interview presentation?",
        opts: ["Write code first, then explain", "Requirements → High-level design → Deep dive → Trade-offs/wrap-up", "Start with the database schema and nothing else", "Present only the happy path"],
        ans: 1,
        expl: [
          "Jumping to code misses the architectural discussion interviewers want — design first, code later if at all.",
          "Correct — This four-step framework ensures you clarify scope, show the big picture, demonstrate depth, and acknowledge trade-offs systematically.",
          "Database schema is one detail within the design — leading with it skips requirement gathering and high-level architecture.",
          "Interviewers specifically want to see how you handle failure cases, scale issues, and edge cases — not just the happy path."
        ]},
      { q: "For a URL shortener handling 100M URLs, what storage approach works best?",
        opts: ["A single relational database with no replication", "A distributed key-value store (e.g., DynamoDB, Cassandra)", "In-memory storage only (Redis without persistence)", "Flat files on a single server"],
        ans: 1,
        expl: [
          "A single database becomes a bottleneck and single point of failure at 100M+ records with high read throughput.",
          "Correct — Key-value stores handle simple lookups (shortCode → URL) at massive scale with horizontal partitioning and high availability.",
          "Pure in-memory storage risks data loss on restart; 100M URLs also need significant RAM (though a Redis cluster with persistence could work as a cache layer).",
          "Flat files offer no indexing, no concurrent access, and no fault tolerance — unsuitable for any production system."
        ]},
      { q: "In a chat system, how should you handle message ordering?",
        opts: ["Use database auto-increment IDs globally", "Use server timestamps combined with a tie-breaking sequence (e.g., Snowflake IDs)", "Let the client sort by local clock", "Don't worry about ordering"],
        ans: 1,
        expl: [
          "Global auto-increment creates a single bottleneck and doesn't work across distributed database instances.",
          "Correct — Snowflake-style IDs embed a timestamp plus machine/sequence bits, giving roughly-ordered, globally-unique IDs without coordination.",
          "Client clocks are unreliable and can be manipulated — server-assigned ordering ensures consistency for all participants.",
          "Chat messages out of order make conversations incoherent — ordering is essential for user experience."
        ]},
      { q: "What is the main advantage of starting a system design interview by clarifying requirements?",
        opts: ["It uses up interview time so you design less", "It scopes the problem and ensures you solve what the interviewer expects", "It shows you can't think independently", "It's only needed for junior candidates"],
        ans: 1,
        expl: [
          "Clarification takes 3-5 minutes and saves you from solving the wrong problem — net time saver.",
          "Correct — Clarifying functional/non-functional requirements aligns you with the interviewer and demonstrates mature engineering thinking.",
          "Asking smart clarifying questions shows you understand that real problems are ambiguous — a senior skill.",
          "Senior engineers are expected to clarify scope even more — ambiguity increases with seniority."
        ]},
      { q: "For a news feed, why use a ranking/scoring algorithm instead of pure chronological order?",
        opts: ["Chronological order is too expensive to compute", "Ranking surfaces more relevant content, increasing user engagement", "Ranking requires less storage", "Users prefer seeing the oldest posts first"],
        ans: 1,
        expl: [
          "Chronological sorting is trivial (sort by timestamp) — ranking is computationally more expensive, not less.",
          "Correct — Ranking by relevance (engagement signals, relationship strength, content type) shows users what matters most, improving retention.",
          "Ranking requires additional metadata, ML models, and feature stores — it uses MORE storage and compute.",
          "Users generally want to see what's important/recent; pure reverse-chronological floods them with low-value posts from high-volume accounts."
        ]},
      { q: "Which technique helps a chat system detect if a client has disconnected?",
        opts: ["Sending large file attachments periodically", "Heartbeat/ping-pong messages over the WebSocket connection", "Checking email delivery status", "DNS lookups every second"],
        ans: 1,
        expl: [
          "Sending files wastes bandwidth and doesn't reliably detect disconnection.",
          "Correct — Regular lightweight ping/pong frames detect dead connections quickly; if a pong isn't received within a timeout, the server marks the client offline.",
          "Email is a completely separate communication channel unrelated to WebSocket connection health.",
          "DNS resolves domain names; it has nothing to do with connection liveness detection."
        ]}
    ];

    let score = 0, answered = 0;
    const quiz = document.getElementById('quiz');

    questions.forEach((item, qi) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>Q${qi+1}. ${item.q}</h3><div class="options" id="q${qi}"></div>`;
      quiz.appendChild(div);
      const optBox = div.querySelector('.options');
      item.opts.forEach((opt, oi) => {
        const btn = document.createElement('div');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(qi, oi);
        optBox.appendChild(btn);
      });
    });

    function selectAnswer(qi, oi) {
      const opts = document.querySelectorAll(`#q${qi} .quiz-option`);
      if (opts[0].classList.contains('disabled')) return;
      answered++;
      if (oi === questions[qi].ans) score++;
      opts.forEach((el, i) => {
        el.classList.add('disabled');
        if (i === questions[qi].ans) el.classList.add('correct'); else if (i === oi) el.classList.add('wrong');
        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.textContent = questions[qi].expl[i];
        el.appendChild(exp);
      });
      if (answered === questions.length) showScore();
    }

    function showScore() {
      const el = document.getElementById('score');
      el.style.display = 'block';
      el.innerHTML = `<strong>Score: ${score}/${questions.length}</strong><br><small>${score >= 8 ? '🎉 Excellent!' : score >= 6 ? '👍 Good job!' : '📖 Review the lessons and try again!'}</small>`;
      el.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
