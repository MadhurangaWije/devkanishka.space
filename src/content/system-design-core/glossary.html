<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Glossary</title>
<link rel="stylesheet" href="../assets/styles.css">
<style>
.glossary-nav{position:sticky;top:0;background:#fff;z-index:10;padding:.75rem 0;border-bottom:2px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:.25rem;align-items:center}
.glossary-nav a{display:inline-block;width:2rem;height:2rem;line-height:2rem;text-align:center;border-radius:.375rem;font-weight:600;font-size:.875rem;color:#4a5568;text-decoration:none;transition:background .15s}
.glossary-nav a:hover,.glossary-nav a.active{background:#4299e1;color:#fff}
.glossary-nav a.disabled{color:#cbd5e0;pointer-events:none}
.search-box{margin:1rem 0;position:relative}
.search-box input{width:100%;padding:.75rem 1rem .75rem 2.5rem;border:2px solid #e2e8f0;border-radius:.5rem;font-size:1rem;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#4299e1}
.search-box::before{content:"🔍";position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:1rem}
.letter-group{margin:2rem 0 1rem;scroll-margin-top:5rem}
.letter-group h2{font-size:1.5rem;color:#2d3748;border-bottom:2px solid #4299e1;padding-bottom:.25rem;display:inline-block}
.term{padding:.5rem 0;border-bottom:1px solid #f0f0f0;display:flex;flex-wrap:wrap;align-items:baseline;gap:.5rem}
.term-name{font-weight:700;color:#1a202c;min-width:180px}
.term-def{flex:1;color:#4a5568;min-width:200px}
.badge{display:inline-block;padding:.1rem .45rem;border-radius:.75rem;font-size:.7rem;font-weight:600;color:#fff;white-space:nowrap}
.badge-1{background:#e53e3e}.badge-2{background:#dd6b20}.badge-3{background:#d69e2e}
.badge-4{background:#38a169}.badge-5{background:#319795}.badge-6{background:#3182ce}
.badge-7{background:#5a67d8}.badge-8{background:#805ad5}.badge-9{background:#d53f8c}
.badge-10{background:#e53e3e}.badge-11{background:#2d3748}.badge-12{background:#718096}
.no-results{display:none;text-align:center;padding:2rem;color:#a0aec0;font-size:1.125rem}
@media print{.glossary-nav,.search-box{display:none}.term{page-break-inside:avoid}}
</style>
</head>
<body>
<h1>📖 System Design Glossary</h1>
<p>A comprehensive reference of key terms. Use the letter bar or search to find terms quickly.</p>

<div class="search-box"><input type="text" id="searchInput" placeholder="Filter terms..." aria-label="Filter glossary terms"></div>

<nav class="glossary-nav" id="letterNav"></nav>

<div id="glossaryContent"></div>
<div class="no-results" id="noResults">No matching terms found.</div>

<script>
const terms = [
["ACID","Properties (Atomicity, Consistency, Isolation, Durability) guaranteeing reliable database transactions.",6],
["Active-Active","A failover strategy where multiple nodes actively handle traffic simultaneously.",4],
["Active-Passive","A failover strategy where a standby node takes over only when the primary fails.",4],
["API Versioning","Managing changes to an API interface so existing clients remain unaffected.",3],
["Asynchronous","Communication where the sender does not wait for an immediate response from the receiver.",5],
["At-Least-Once Delivery","A messaging guarantee ensuring every message is delivered one or more times.",5],
["Authentication","Verifying the identity of a user or service requesting access.",11],
["Authorization","Determining whether an authenticated entity has permission to perform an action.",11],
["Availability","The proportion of time a system is operational and accessible to users.",2],
["B-Tree","A self-balancing tree data structure that maintains sorted data for efficient search and insertion in databases.",6],
["Back-of-Envelope Estimation","Rough calculations used to evaluate system capacity and feasibility early in design.",2],
["Backward Compatibility","The ability of a system to interoperate with older versions of itself or its interfaces.",3],
["Batch Processing","Processing accumulated data in large groups at scheduled intervals rather than in real time.",7],
["Bounded Context","A DDD concept defining a clear boundary within which a domain model applies consistently.",3],
["Bulkhead","An isolation pattern that prevents a failure in one component from cascading to others.",10],
["Cache","A high-speed storage layer that stores frequently accessed data to reduce latency.",5],
["Cache-Aside","A caching strategy where the application loads data into cache on demand upon a cache miss.",5],
["Cache Hit","When requested data is found in the cache, avoiding a slower backend lookup.",5],
["Cache Invalidation","The process of removing or updating stale data in a cache to maintain correctness.",5],
["Cache Miss","When requested data is not found in the cache, requiring a fetch from the origin.",5],
["Causal Consistency","A consistency model ensuring operations that are causally related are seen in order by all nodes.",6],
["CDN","A geographically distributed network of servers that delivers content to users from the nearest edge location.",5],
["Chaos Engineering","The practice of intentionally injecting failures to test system resilience under adverse conditions.",10],
["Circuit Breaker","A pattern that stops requests to a failing service, allowing it time to recover before retrying.",10],
["Connection Pooling","Reusing a pool of established database connections to reduce the overhead of creating new ones.",6],
["Consensus","A protocol by which distributed nodes agree on a single data value or system state.",8],
["Consistency","The guarantee that all nodes in a distributed system see the same data at the same time.",2],
["Consistent Hashing","A hashing technique that minimizes key redistribution when nodes are added or removed.",4],
["Consumer","A component that reads and processes messages from a queue or topic.",5],
["CQRS","A pattern separating read and write operations into different models for independent scaling.",7],
["CRDT","Conflict-free Replicated Data Types that allow concurrent updates across replicas without coordination.",8],
["CSRF","Cross-Site Request Forgery — an attack that tricks a user's browser into making unintended requests.",11],
["Data Lake","A centralized repository storing raw data in its native format for future analysis.",7],
["Data Warehouse","A system optimized for analytical queries over large volumes of structured historical data.",7],
["DDoS","Distributed Denial of Service — an attack overwhelming a system with traffic from many sources.",11],
["Dead Letter Queue","A queue that stores messages that could not be processed successfully for later inspection.",5],
["Denormalization","Introducing redundancy into a database schema to optimize read performance at the cost of write complexity.",6],
["Distributed Tracing","Tracking a request across multiple services to diagnose latency and failures in a distributed system.",10],
["DNS","Domain Name System — translates human-readable domain names into IP addresses.",3],
["Domain-Driven Design","A software design approach that models complex systems around the business domain and its logic.",3],
["Durability","The guarantee that once a transaction is committed, its data persists even after a system failure.",6],
["Edge Server","A server positioned at the network edge, close to end-users, to reduce latency.",5],
["ELT","Extract, Load, Transform — a pipeline variant that loads raw data first, then transforms it in place.",7],
["Encryption at Rest","Protecting stored data by encrypting it on disk so it is unreadable without the correct key.",11],
["Encryption in Transit","Protecting data as it moves over a network using protocols like TLS.",11],
["Error Budget","The allowed amount of unreliability within an SLO before further changes are restricted.",10],
["ETL","Extract, Transform, Load — a data pipeline that extracts, reshapes, and stores data in a target system.",7],
["Event-Driven Architecture","A design where components communicate by producing and reacting to events asynchronously.",7],
["Event Sourcing","Persisting state as an append-only sequence of events rather than mutable records.",7],
["Eventual Consistency","A model where replicas converge to the same state given enough time without new updates.",8],
["Exactly-Once Delivery","A messaging guarantee ensuring each message is processed precisely once despite retries or failures.",5],
["Failover","Automatically switching to a redundant system when the primary system becomes unavailable.",4],
["Fan-Out","Distributing a single message or request to multiple downstream consumers or services.",5],
["Foreign Key","A database column that establishes a link between data in two tables.",6],
["Functional Requirements","Specifications describing what a system should do in terms of features and behavior.",1],
["Golden Signals","Four key metrics (latency, traffic, errors, saturation) for monitoring distributed systems.",10],
["GraphQL","A query language for APIs that allows clients to request exactly the data they need.",3],
["gRPC","A high-performance RPC framework using HTTP/2 and Protocol Buffers for efficient service communication.",3],
["HATEOAS","Hypermedia As The Engine Of Application State — a REST constraint where responses include navigable links.",3],
["Health Check","An endpoint or probe that reports whether a service is running and ready to accept traffic.",10],
["Horizontal Scaling","Adding more machines to a system to handle increased load (scaling out).",4],
["HTTP","Hypertext Transfer Protocol — the foundational request-response protocol of the web.",3],
["HTTPS","HTTP secured with TLS encryption to protect data in transit between client and server.",11],
["Idempotency","The property that performing an operation multiple times produces the same result as doing it once.",3],
["Index","A data structure that improves the speed of data retrieval operations on a database table.",6],
["JWT","JSON Web Token — a compact, self-contained token used to securely transmit claims between parties.",11],
["Latency","The time delay between a request being sent and its response being received.",2],
["Layer 4","Transport-layer load balancing that routes traffic based on TCP/UDP connection information.",4],
["Layer 7","Application-layer load balancing that routes traffic based on HTTP headers, URLs, or content.",4],
["Leader-Follower","A replication topology where one node (leader) handles writes and followers replicate its data.",6],
["Least Connections","A load-balancing algorithm that routes traffic to the server with the fewest active connections.",4],
["Load Balancer","A component that distributes incoming network traffic across multiple backend servers.",4],
["Long Polling","A technique where the client holds a request open until the server has new data to send.",3],
["Logs","Append-only records of discrete events used for debugging, auditing, and observability.",10],
["Message Queue","A middleware component that decouples producers and consumers by buffering messages between them.",5],
["Metrics","Numeric measurements collected over time to quantify system behavior and performance.",10],
["Microservices","An architecture decomposing an application into small, independently deployable services.",3],
["Monolith","A single-unit application where all components share one codebase and deployment artifact.",3],
["mTLS","Mutual TLS — both client and server authenticate each other using certificates.",11],
["Non-Functional Requirements","Specifications describing system qualities like performance, scalability, and reliability.",1],
["NoSQL","A category of databases that use non-relational data models such as key-value, document, or graph.",6],
["OAuth2","An authorization framework that grants third-party applications limited access to user resources.",11],
["Observability","The ability to infer a system's internal state from its external outputs (logs, metrics, traces).",10],
["OLAP","Online Analytical Processing — systems optimized for complex queries over large datasets.",7],
["OLTP","Online Transaction Processing — systems optimized for high-volume, low-latency transactional workloads.",6],
["Partition","A segment of data distributed across nodes to enable parallel processing and storage scaling.",8],
["Partition Tolerance","The ability of a system to continue operating despite network partitions between nodes.",2],
["Primary Key","A unique identifier for each record in a database table.",6],
["Producer","A component that creates and sends messages to a queue or topic.",5],
["Protocol Buffers","Google's language-neutral binary serialization format for efficient structured data encoding.",3],
["Pub/Sub","A messaging pattern where publishers emit events to topics and subscribers receive them independently.",5],
["Pull Model","A communication pattern where consumers request data from producers when ready.",5],
["Push Model","A communication pattern where producers send data to consumers as soon as it is available.",5],
["QUIC","A UDP-based transport protocol providing multiplexed, low-latency connections with built-in encryption.",3],
["Quorum","The minimum number of nodes that must agree for a distributed operation to be considered successful.",8],
["Raft","A consensus algorithm designed for understandability that elects a leader to manage log replication.",8],
["Rate Limiting","Controlling the number of requests a client can make in a given time window.",4],
["RBAC","Role-Based Access Control — assigning permissions to roles rather than individual users.",11],
["Read Replica","A read-only copy of a database used to offload read traffic from the primary node.",6],
["Replication","Copying data across multiple nodes to improve availability and fault tolerance.",6],
["REST","Representational State Transfer — an architectural style using stateless HTTP methods for resource access.",3],
["Reverse Proxy","A server that sits in front of backend servers, forwarding client requests and providing abstraction.",4],
["Round Robin","A load-balancing algorithm that distributes requests sequentially across available servers.",4],
["Saga Pattern","A sequence of local transactions coordinated to maintain consistency across distributed services.",8],
["Scale Cube","A model describing three scaling dimensions: X (cloning), Y (functional split), Z (data partitioning).",4],
["Schema Registry","A service that stores and validates schemas for data formats used in event streaming.",7],
["Service Discovery","The mechanism by which services locate and communicate with each other in a dynamic environment.",9],
["Service Mesh","An infrastructure layer handling service-to-service communication with features like mTLS, retries, and observability.",9],
["Session","Server-side state associated with a specific client across multiple requests.",3],
["Shard Key","The attribute used to determine which shard a particular piece of data belongs to.",6],
["Sharding","Partitioning a database horizontally so each shard holds a subset of the data.",6],
["Sidecar Proxy","A helper process deployed alongside a service to handle cross-cutting concerns like networking and security.",9],
["Single Server Architecture","A deployment where all application components run on one machine.",1],
["SLA","Service Level Agreement — a contract defining the guaranteed level of service between provider and customer.",2],
["SLI","Service Level Indicator — a quantitative measurement of a specific aspect of service performance.",10],
["SLO","Service Level Objective — a target value or range for an SLI that the team aims to meet.",10],
["SQL","Structured Query Language — the standard language for querying and managing relational databases.",6],
["SQL Injection","An attack that inserts malicious SQL into queries to manipulate or access unauthorized data.",11],
["Stateful","A design where the server retains client state between requests.",3],
["Stateless","A design where each request contains all information needed, with no server-side session state.",3],
["Strangler Fig Pattern","Incrementally replacing a legacy system by routing traffic to new components over time.",9],
["Stream Processing","Continuously processing data records in real time as they arrive rather than in batches.",7],
["Strong Consistency","A model guaranteeing that any read returns the most recent write across all nodes.",8],
["Synchronous","Communication where the sender blocks until a response is received from the receiver.",5],
["System Design","The process of defining architecture, components, and data flow to meet functional and non-functional requirements.",1],
["TCP","Transmission Control Protocol — a reliable, ordered, connection-oriented transport protocol.",3],
["Throughput","The amount of work or data a system processes per unit of time.",2],
["Throttling","Deliberately limiting the rate of operations to protect system resources from overload.",4],
["Thundering Herd","A problem where many clients simultaneously retry or request the same resource, causing spikes.",5],
["TLS","Transport Layer Security — a cryptographic protocol providing privacy and integrity for network communication.",11],
["Token Bucket","A rate-limiting algorithm that allows bursts by accumulating tokens over time up to a maximum.",4],
["Traces","End-to-end records following a request's path through distributed services for diagnosis.",10],
["Trade-off","A design decision where improving one quality attribute comes at the expense of another.",2],
["Two-Phase Commit","A protocol ensuring all participants in a distributed transaction either commit or abort together.",8],
["UDP","User Datagram Protocol — a connectionless transport protocol offering low overhead with no delivery guarantee.",3],
["Ubiquitous Language","A shared vocabulary between developers and domain experts within a bounded context.",3],
["Vector Clock","A mechanism for tracking causal ordering of events across distributed nodes.",8],
["Vertical Scaling","Increasing a single machine's resources (CPU, RAM) to handle more load (scaling up).",4],
["VPC","Virtual Private Cloud — an isolated virtual network within a cloud provider's infrastructure.",11],
["WAF","Web Application Firewall — filters and monitors HTTP traffic to protect against web exploits.",11],
["WebSocket","A protocol providing full-duplex, persistent communication between client and server over a single connection.",3],
["Windowing","Dividing a continuous data stream into finite time-based or count-based segments for processing.",7],
["Write-Behind","A caching strategy that writes data to the cache first and asynchronously persists to the backend.",5],
["Write-Through","A caching strategy that writes data to both cache and backend simultaneously.",5],
["XSS","Cross-Site Scripting — an attack injecting malicious scripts into web pages viewed by other users.",11],
["X-Axis Scaling","Scaling by cloning; running multiple identical copies behind a load balancer.",4],
["Y-Axis Scaling","Scaling by functional decomposition; splitting an application into distinct services.",4],
["Z-Axis Scaling","Scaling by data partitioning; each server handles a subset of the data.",4],
["Zero Trust","A security model that verifies every request regardless of network location.",11]
];

terms.sort((a,b)=>a[0].replace(/[^a-zA-Z]/,'').toUpperCase().localeCompare(b[0].replace(/[^a-zA-Z]/,'').toUpperCase()));

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const nav=document.getElementById("letterNav");
const content=document.getElementById("glossaryContent");
const noResults=document.getElementById("noResults");

// Group terms by first letter
const groups={};
terms.forEach(t=>{
  let fl=t[0].replace(/[^a-zA-Z]/,"").charAt(0).toUpperCase();
  if(!groups[fl])groups[fl]=[];
  groups[fl].push(t);
});

// Build nav
letters.forEach(l=>{
  const a=document.createElement("a");
  a.textContent=l;
  if(groups[l]){a.href="#letter-"+l;}
  else{a.classList.add("disabled");}
  nav.appendChild(a);
});

// Build content
letters.forEach(l=>{
  if(!groups[l])return;
  const section=document.createElement("section");
  section.className="letter-group";
  section.id="letter-"+l;
  section.innerHTML=`<h2>${l}</h2>`;
  groups[l].forEach(t=>{
    const div=document.createElement("div");
    div.className="term";
    div.dataset.term=t[0].toLowerCase();
    div.innerHTML=`<span class="term-name">${t[0]}</span><span class="term-def">${t[1]}</span><span class="badge badge-${t[2]}">Ch.${t[2]}</span>`;
    section.appendChild(div);
  });
  content.appendChild(section);
});

// Search/filter
document.getElementById("searchInput").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();
  let visible=0;
  document.querySelectorAll(".term").forEach(el=>{
    const show=!q||el.dataset.term.includes(q)||el.querySelector(".term-def").textContent.toLowerCase().includes(q);
    el.style.display=show?"":"none";
    if(show)visible++;
  });
  document.querySelectorAll(".letter-group").forEach(s=>{
    const has=[...s.querySelectorAll(".term")].some(t=>t.style.display!=="none");
    s.style.display=has?"":"none";
  });
  noResults.style.display=visible===0?"block":"none";
});
</script>
</body>
</html>
