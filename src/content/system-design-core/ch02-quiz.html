<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 2 Quiz — How the Internet Works</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .quiz-progress{display:flex;gap:4px;margin:1rem 0;flex-wrap:wrap}
    .quiz-progress .dot{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .dot.correct{background:#c6f6d5;color:#276749}.dot.wrong{background:#fed7d7;color:#9b2c2c}.dot.current{outline:2px solid #4299e1}
    .question-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:1.5rem;margin:1rem 0}
    .options{list-style:none;padding:0;display:grid;gap:0.5rem}
    .option-btn{width:100%;text-align:left;padding:0.75rem 1rem;border:2px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;transition:border-color .2s}
    .option-btn:hover:not(:disabled){border-color:#4299e1}
    .option-btn:disabled{cursor:default}
    .option-btn.selected-correct{border-color:#48bb78;background:#f0fff4}
    .option-btn.selected-wrong{border-color:#f56565;background:#fff5f5}
    .option-btn.reveal-correct{border-color:#48bb78;background:#f0fff4}
    .explanation{margin-top:0.5rem;padding:0.5rem 0.75rem;font-size:0.85rem;border-radius:4px;display:none}
    .explanation.show{display:block}
    .explanation.correct-exp{background:#f0fff4;color:#276749}.explanation.wrong-exp{background:#fff5f5;color:#9b2c2c}
    .score-card{text-align:center;padding:2rem}.score-card h2{margin-bottom:0.5rem}
    .nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:0.5rem}
    .btn{padding:0.5rem 1rem;border-radius:6px;background:#4299e1;color:#fff;text-decoration:none;border:none;cursor:pointer;font-size:0.9rem}
    .btn:hover{background:#3182ce}.btn.secondary{background:#718096}
  </style>
</head>
<body>
  <h1>Chapter 2 Quiz: How the Internet Works</h1>
  <div class="lesson-meta"><span>📘 Covers Lessons 5–8</span><span>🎯 9 Questions</span></div>
  <div class="quiz-progress" id="progress"></div>
  <div id="quiz-container"></div>
  <div id="score-container" class="score-card card" style="display:none"></div>
  <div class="nav-row">
    <a href="0005-dns-the-internets-phone-book.html" class="btn secondary">← Chapter 2 Lessons</a>
    <a href="0009-single-server-architecture.html" class="btn">Chapter 3 →</a>
  </div>
  <script>
const questions=[
{q:"What is the primary role of DNS in web communication?",
options:["Encrypting data between client and server","Translating human-readable domain names into IP addresses","Routing packets across network hops","Compressing HTTP responses for faster delivery"],
correct:1,
explanations:["Encryption is handled by TLS/SSL, not DNS.","Correct — DNS resolves names like 'example.com' to IP addresses like 93.184.216.34, enabling browsers to find servers.","Routing is handled by routers and the IP layer, not DNS.","Compression is an HTTP-level feature (e.g., gzip). DNS only resolves names to addresses."]},
{q:"During DNS resolution, what is the correct order of servers queried (assuming nothing is cached)?",
options:["Root → TLD → Authoritative","TLD → Root → Authoritative","Authoritative → Root → TLD","Root → Authoritative → TLD"],
correct:0,
explanations:["Correct — the resolver asks the root server which points to the TLD (.com), which points to the authoritative nameserver for the domain.","The root must be queried first to find which TLD server to ask.","The authoritative server is the final step, not the first — you need to discover it via root and TLD.","The TLD step must come between root and authoritative — root doesn't know individual domains."]},
{q:"Which HTTP method is idempotent AND safe (causes no side effects on the server)?",
options:["POST","GET","PUT","DELETE"],
correct:1,
explanations:["POST creates resources and is neither idempotent nor safe — each call may create a new resource.","Correct — GET only retrieves data, never modifies server state. It's both safe and idempotent.","PUT is idempotent (same result if repeated) but NOT safe — it modifies server state.","DELETE is idempotent but not safe — it removes a resource from the server."]},
{q:"A server returns HTTP status code 304. What does this mean?",
options:["The resource was permanently moved","The resource has not been modified since last request — use your cached copy","The server encountered an internal error","The request was malformed"],
correct:1,
explanations:["301 means permanently moved. 304 is about caching.","Correct — 304 Not Modified tells the client its cached version is still valid, saving bandwidth.","5xx codes indicate server errors. 304 is a 3xx redirection/caching response.","400 means bad request. 304 is a successful cache-validation response."]},
{q:"A video streaming application needs to send real-time data where occasional packet loss is acceptable. Which protocol is more appropriate?",
options:["TCP — because it guarantees delivery","UDP — because it prioritizes low latency over reliability","HTTP/2 — because it supports multiplexing","FTP — because it handles large files"],
correct:1,
explanations:["TCP's retransmission adds latency. For live video, a dropped frame is better than a delayed stream.","Correct — UDP skips acknowledgments and retransmissions, giving lower latency. A lost video frame is barely noticeable, but stuttering from TCP retries is very noticeable.","HTTP/2 runs over TCP and still has reliability overhead. It's for web resources, not raw streaming.","FTP is for file transfers and uses TCP underneath — it's not designed for real-time streaming."]},
{q:"What does TLS (Transport Layer Security) provide in HTTPS?",
options:["Faster DNS resolution","Encryption, authentication, and data integrity","Load balancing across multiple servers","Compression of HTML content"],
correct:1,
explanations:["TLS has nothing to do with DNS resolution speed.","Correct — TLS encrypts data in transit, verifies server identity via certificates, and ensures data isn't tampered with using MACs.","Load balancing is an infrastructure concern handled by dedicated hardware/software, not TLS.","While TLS can negotiate compression, its primary purpose is security (encryption + authentication + integrity)."]},
{q:"During a typical web request, what happens IMMEDIATELY AFTER DNS resolution?",
options:["The browser renders the HTML","The browser establishes a TCP connection (and TLS handshake for HTTPS)","The server sends the response body","The browser checks its local cache"],
correct:1,
explanations:["Rendering happens much later — after receiving and parsing the response.","Correct — once the IP is known, the browser initiates TCP's 3-way handshake (SYN → SYN-ACK → ACK), then TLS if HTTPS.","The server can't send anything until a connection is established and a request is sent.","Cache checking typically happens BEFORE DNS resolution — if the resource is cached, no network call is needed."]},
{q:"TCP uses a '3-way handshake' to establish connections. What are the three steps?",
options:["REQUEST → RESPONSE → ACK","SYN → SYN-ACK → ACK","HELLO → HELLO-ACK → READY","CONNECT → ACCEPT → CONFIRM"],
correct:1,
explanations:["REQUEST/RESPONSE are HTTP-level concepts, not TCP connection establishment.","Correct — Client sends SYN, server responds with SYN-ACK, client confirms with ACK. This establishes sequence numbers for reliable communication.","These aren't real TCP flags. TCP uses SYN, ACK, FIN, RST, etc.","These aren't TCP terminology. The actual flags used are SYN and ACK."]},
{q:"Which HTTP status code range indicates the CLIENT made an error?",
options:["1xx","2xx","4xx","5xx"],
correct:2,
explanations:["1xx codes are informational (e.g., 100 Continue) — not errors at all.","2xx codes mean success (e.g., 200 OK, 201 Created) — the opposite of an error.","Correct — 4xx means client error: 400 Bad Request, 401 Unauthorized, 404 Not Found, 429 Too Many Requests, etc.","5xx codes indicate SERVER errors (500 Internal Server Error, 503 Service Unavailable). The client's request may have been valid."]}
];
let score=0,answered=0;
const container=document.getElementById('quiz-container');
const progressEl=document.getElementById('progress');
function init(){
  questions.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' current':'');d.textContent=i+1;progressEl.appendChild(d)});
  renderQuestion(0);
}
function renderQuestion(idx){
  if(idx>=questions.length){showScore();return}
  const q=questions[idx];
  container.innerHTML=`<div class="question-card"><h3>Question ${idx+1} of ${questions.length}</h3><p><strong>${q.q}</strong></p><ul class="options">${q.options.map((o,i)=>`<li><button class="option-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button><div class="explanation ${i===q.correct?'correct-exp':'wrong-exp'}" id="exp-${i}">${q.explanations[i]}</div></li>`).join('')}</ul><button class="btn" id="next-btn" style="display:none;margin-top:1rem">Next →</button></div>`;
  container.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(idx,parseInt(btn.dataset.idx)))});
}
function handleAnswer(qIdx,chosen){
  const q=questions[qIdx];const btns=container.querySelectorAll('.option-btn');
  btns.forEach((btn,i)=>{btn.disabled=true;if(i===q.correct)btn.classList.add('reveal-correct');if(i===chosen&&chosen!==q.correct)btn.classList.add('selected-wrong');if(i===chosen&&chosen===q.correct)btn.classList.add('selected-correct')});
  container.querySelectorAll('.explanation').forEach(el=>el.classList.add('show'));
  const dots=progressEl.querySelectorAll('.dot');
  if(chosen===q.correct){score++;dots[qIdx].classList.add('correct')}else{dots[qIdx].classList.add('wrong')}
  dots[qIdx].classList.remove('current');if(qIdx+1<questions.length)dots[qIdx+1].classList.add('current');
  answered++;
  const next=document.getElementById('next-btn');next.style.display='inline-block';next.addEventListener('click',()=>renderQuestion(qIdx+1));
}
function showScore(){
  container.innerHTML='';const pct=Math.round(score/questions.length*100);
  document.getElementById('score-container').style.display='block';
  document.getElementById('score-container').innerHTML=`<h2>${pct>=80?'🎉':'💪'} You scored ${score}/${questions.length} (${pct}%)</h2><p>${pct>=80?'Excellent! You understand how the internet works.':'Review the chapter lessons and try again!'}</p><button class="btn" onclick="location.reload()">Retake Quiz</button>`;
}
init();
  </script>
</body>
</html>
