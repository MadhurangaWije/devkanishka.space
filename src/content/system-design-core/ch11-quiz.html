<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 11 Quiz — API Design</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        .quiz-option { display: block; margin: 0.4rem 0; padding: 0.7rem 1rem; border: 2px solid var(--border, #ccc); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .quiz-option:hover:not(.disabled) { background: #f0f0f0; }
        .quiz-option.correct { border-color: #16a34a; background: #dcfce7; }
        .quiz-option.wrong { border-color: #dc2626; background: #fee2e2; }
        .quiz-option.disabled { cursor: default; opacity: 0.85; }
        .explanation { margin-top: 0.3rem; font-size: 0.88rem; color: #555; }
        .score-box { text-align: center; font-size: 1.3rem; margin: 2rem 0; padding: 1.5rem; }
        .quiz-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        .quiz-nav a { text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 Chapter 11 Quiz: API Design</h1>
    <div class="lesson-meta">
        <span>📘 Chapter 11: API Design</span>
        <span>🧪 10 Questions</span>
    </div>

    <div class="quiz-nav">
        <a href="0045-rest-api-design-principles.html">Lesson 45</a> •
        <a href="0046-graphql-when-rest-isnt-enough.html">Lesson 46</a> •
        <a href="0047-grpc-and-protocol-buffers.html">Lesson 47</a> •
        <a href="0048-api-versioning-backward-compatibility.html">Lesson 48</a>
    </div>

    <div id="quiz"></div>
    <div id="score" class="card score-box" style="display:none;"></div>

    <script>
    const questions = [
      { q: "Which HTTP method is idempotent and used to fully replace a resource?",
        opts: ["POST", "PUT", "PATCH", "DELETE"],
        ans: 1,
        expl: [
          "POST creates a new resource and is NOT idempotent — calling it twice creates two resources.",
          "Correct — PUT replaces the entire resource and produces the same result regardless of how many times it's called.",
          "PATCH applies a partial update and may not be idempotent depending on the operation (e.g., increment).",
          "DELETE is idempotent (deleting twice yields the same state) but removes rather than replaces a resource."
        ]},
      { q: "When is GraphQL a better fit than REST?",
        opts: ["Backend services communicating internally", "Mobile clients needing flexible, minimal payloads", "Simple CRUD with a single consumer", "File upload endpoints"],
        ans: 1,
        expl: [
          "Internal services benefit more from gRPC's speed and type safety than GraphQL's flexibility.",
          "Correct — GraphQL lets mobile clients request exactly the fields they need, reducing over-fetching on constrained networks.",
          "For simple CRUD with one consumer REST is simpler; GraphQL adds schema complexity without much benefit.",
          "GraphQL handles file uploads poorly; multipart REST endpoints or presigned URLs are better."
        ]},
      { q: "What transport protocol does gRPC use by default?",
        opts: ["HTTP/1.1", "HTTP/2", "WebSocket", "Raw TCP"],
        ans: 1,
        expl: [
          "HTTP/1.1 lacks multiplexing and header compression that gRPC requires for streaming.",
          "Correct — gRPC uses HTTP/2 for multiplexed streams, header compression, and bidirectional communication.",
          "WebSocket is a separate protocol; gRPC's streaming is built on HTTP/2 frames, not WebSocket.",
          "gRPC doesn't use raw TCP — it layers on HTTP/2 to get routing, load-balancing, and TLS for free."
        ]},
      { q: "Which is a NON-breaking API change?",
        opts: ["Removing a required field from the response", "Changing an endpoint's URL path", "Adding an optional query parameter", "Changing a field from string to integer"],
        ans: 2,
        expl: [
          "Removing a field breaks clients that depend on it being present.",
          "Changing URL paths breaks all existing client integrations immediately.",
          "Correct — adding an optional parameter doesn't affect existing clients who simply don't send it.",
          "Changing a field's type breaks deserialization in every existing client."
        ]},
      { q: "Which HTTP status code means the server understood the request but refuses to authorize it?",
        opts: ["401 Unauthorized", "403 Forbidden", "404 Not Found", "400 Bad Request"],
        ans: 1,
        expl: [
          "401 means the client hasn't authenticated yet — credentials are missing or invalid.",
          "Correct — 403 means the server knows who you are but you don't have permission for this resource.",
          "404 means the resource doesn't exist (or is intentionally hidden), not an authorization issue.",
          "400 means the request itself is malformed, unrelated to authorization."
        ]},
      { q: "In REST, what does HATEOAS provide?",
        opts: ["Authentication tokens in response headers", "Links to related actions/resources in responses", "Automatic request retry logic", "Client-side caching directives"],
        ans: 1,
        expl: [
          "HATEOAS is about discoverability through links, not authentication mechanisms.",
          "Correct — HATEOAS (Hypermedia As The Engine Of Application State) embeds links so clients discover available transitions dynamically.",
          "Retry logic is a client concern; HATEOAS addresses API navigation through hypermedia.",
          "Caching is controlled by Cache-Control headers, not HATEOAS links."
        ]},
      { q: "What serialization format does gRPC use by default?",
        opts: ["JSON", "XML", "Protocol Buffers", "MessagePack"],
        ans: 2,
        expl: [
          "JSON is human-readable but slower to serialize; gRPC prefers a compact binary format.",
          "XML is verbose and rarely used in modern RPC frameworks.",
          "Correct — Protocol Buffers (protobuf) provide compact binary serialization with strong typing and code generation.",
          "MessagePack is binary JSON-like but gRPC was designed around protobuf's schema-first approach."
        ]},
      { q: "Which GraphQL feature solves the N+1 query problem on the server?",
        opts: ["Subscriptions", "Fragments", "DataLoader (batching)", "Mutations"],
        ans: 2,
        expl: [
          "Subscriptions are for real-time push updates, not query optimization.",
          "Fragments reduce query duplication on the client but don't address N+1 server queries.",
          "Correct — DataLoader batches and deduplicates database calls within a single request, solving N+1.",
          "Mutations are for write operations and have no relation to the N+1 read problem."
        ]},
      { q: "Which API versioning strategy is embedded directly in the URL path?",
        opts: ["Accept header versioning", "Query parameter versioning", "URI path versioning (e.g., /v2/users)", "Content negotiation"],
        ans: 2,
        expl: [
          "Accept header versioning puts the version in the Accept header (e.g., application/vnd.api.v2+json), not the path.",
          "Query parameter versioning uses ?version=2 — it's in the URL but not the path segment.",
          "Correct — URI path versioning like /v2/users embeds the version directly in the URL path, making it highly visible.",
          "Content negotiation uses headers to specify format/version, keeping URLs version-free."
        ]},
      { q: "Why might you choose gRPC over REST for inter-service communication?",
        opts: ["Better browser support", "Human-readable payloads for debugging", "Strong typing with code generation and lower latency", "Simpler implementation with no schema"],
        ans: 2,
        expl: [
          "Browser support for gRPC is limited; REST/JSON has universal browser support.",
          "gRPC uses binary protobuf which is NOT human-readable; REST/JSON wins for debugging ease.",
          "Correct — gRPC's protobuf schemas generate typed client/server stubs and binary encoding is faster to serialize and smaller on the wire.",
          "gRPC requires .proto schema definitions — it's more structured than REST, not less."
        ]}
    ];

    let score = 0, answered = 0;
    const quiz = document.getElementById('quiz');

    questions.forEach((item, qi) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>Q${qi+1}. ${item.q}</h3><div class="options" id="q${qi}"></div>`;
      quiz.appendChild(div);
      const optBox = div.querySelector('.options');
      item.opts.forEach((opt, oi) => {
        const btn = document.createElement('div');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(qi, oi);
        optBox.appendChild(btn);
      });
    });

    function selectAnswer(qi, oi) {
      const opts = document.querySelectorAll(`#q${qi} .quiz-option`);
      if (opts[0].classList.contains('disabled')) return;
      answered++;
      if (oi === questions[qi].ans) score++;
      opts.forEach((el, i) => {
        el.classList.add('disabled');
        if (i === questions[qi].ans) el.classList.add('correct'); else if (i === oi) el.classList.add('wrong');
        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.textContent = questions[qi].expl[i];
        el.appendChild(exp);
      });
      if (answered === questions.length) showScore();
    }

    function showScore() {
      const el = document.getElementById('score');
      el.style.display = 'block';
      el.innerHTML = `<strong>Score: ${score}/${questions.length}</strong><br><small>${score >= 8 ? '🎉 Excellent!' : score >= 6 ? '👍 Good job!' : '📖 Review the lessons and try again!'}</small>`;
      el.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
